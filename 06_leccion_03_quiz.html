<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz / Deepmersion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* AJUSTE PARA CENTRADO PERFECTO */
        html, body { 
            height: 100%; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #ffffff; 
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            justify-content: center;
            min-height: auto; 
        }

        /* BLOQUE DE CONVERSIÓN OCULTO */
        #conversion-upgrade {
            display: none;
            width: 100%;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="../deepmersion.jpeg"></div>
        
        <p class="indicator">Quiz 01</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 60%;"></div>
        </div>
        
        <h1 class="title">Sincronización.</h1>
        <p class="description">¿Qué te detiene hoy?</p>
        
        <div id="quiz-block" style="width: 100%;">
            <div class="work-area">
                <button class="option-btn" onclick="this.classList.toggle('selected')">Falta de enfoque.</button>
                <button class="option-btn" onclick="this.classList.toggle('selected')">Ruido externo.</button>
            </div>
            <button id="next-btn" class="btn-mando" onclick="window.location.href='m_siguiente.html'">Sincronizar →</button>
        </div>

        <div id="conversion-upgrade">
            <p class="indicator" style="margin-bottom:10px;">Estatus: Evaluación Superada</p>
            <h2 class="title" style="font-size: 24px; margin-bottom: 12px;">¿Listo para el Tramo 02?</h2>
            <p class="description" style="font-size: 14px; margin-bottom: 25px;">Tus respuestas del Tramo 01 ya han sido procesadas. El siguiente nivel de sincronización te espera.</p>
            <button class="btn-mando" onclick="window.location.href='../hub.html'">Avanzar al Tramo 02 →</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();

                        // Lógica de intercambio: Si terminó el programa pero no tiene el Tramo 02
                        if (data.fase === "Finalizado" && !data.access_DM) {
                            document.getElementById('conversion-upgrade').style.display = 'block';
                            document.getElementById('quiz-block').style.display = 'none';
                        }
                    }
                });
            } else {
                window.location.href = "../index.html";
            }
        });
    </script>
</body>
</html>
