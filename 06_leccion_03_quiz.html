<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz / Deepmersion</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        <p class="indicator">Quiz 01</p>
        <div class="progress-container"><div class="progress-fill" style="width: 60%;"></div></div>
        <h1 class="title">Sincronización.</h1>
        
        <p id="quiz-desc" class="description">¿Qué te detiene hoy?</p>
        
        <div id="quiz-area" class="work-area">
            <button class="option-btn" onclick="this.classList.toggle('selected')">Falta de enfoque.</button>
            <button class="option-btn" onclick="this.classList.toggle('selected')">Ruido externo.</button>
        </div>
        
        <button id="btn-next" class="btn-mando" onclick="window.location.href='m_siguiente.html'">Sincronizar →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const btn = document.getElementById('btn-next');

                        // Lógica para cuando el usuario ya finalizó el programa
                        if (data.fase === "Finalizado" && !data.access_DM) {
                            // Ocultar las opciones del quiz
                            document.getElementById('quiz-area').style.display = 'none';
                            
                            // Cambiar el texto de la descripción
                            document.getElementById('quiz-desc').innerText = "Evaluación completada. Tus respuestas ya fueron asimiladas por el sistema.";
                            
                            // Cambiar el botón hacia el Hub
                            btn.innerText = "Avanzar al tramo 02 →";
                            btn.onclick = function() { window.location.href = 'hub.html'; };
                        }
                    }
                });
            } else {
                // Centinela
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
