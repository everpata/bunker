<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evidencia / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS ESPECÍFICOS */
        
        /* Botón Rojo Elástico (Márgenes V4.0 vía style.css) */
        .btn-status-alert {
            display: none; 
            background-color: #fce8e6 !important;
            color: #d93025 !important;
            border: 1px solid #d93025 !important;
            font-weight: 700 !important;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(217, 48, 37, 0.1);
            animation: btnElastic 4s ease-in-out infinite;
            text-align: center;
            margin-top: 35px !important;
        }

        @keyframes btnElastic {
            0% { padding-top: 18px; padding-bottom: 18px; }
            50% { padding-top: 24px; padding-bottom: 24px; }
            100% { padding-top: 18px; padding-bottom: 18px; }
        }

        /* Ocultar inicialmente para evitar parpadeos visuales */
        #btn-continuar, #btn-alerta-reporte, #btn-volver-hub { display: none; }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DM.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        <p class="indicator">Evidencias 04 / DM</p>
        <div class="progress-container"><div class="progress-fill" style="width: 60%;"></div></div>
        
        <h1 class="title">Resultados.</h1>
        <p class="description">La manifestación real de la nueva operativa.</p>
        
        <div class="work-area">
            <img src="yo.jpeg" class="evidence-image" alt="Evidencia Operativa">
        </div>

        <button id="btn-continuar" class="btn-mando">Continuar →</button>
        <button id="btn-alerta-reporte" class="btn-status-alert">REVISAR REPORTE DE DAÑOS →</button>
        <button id="btn-volver-hub" class="btn-ghost">← Volver al Hub</button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "04_DM_imagen.html"; 
        const archivoSiguiente = "05_DM_video.html"; 
        const archivoHub = "09_DM_hub.html"; 
        const archivoReporte = "08_DM_reportefinal.html";
        const archivoExpulsion = "index.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Asignación de Eventos
        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-alerta-reporte").onclick = () => { window.location.href = archivoReporte; };
        document.getElementById("btn-volver-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DM === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            const btnNegro = document.getElementById("btn-continuar");
                            const btnRojo = document.getElementById("btn-alerta-reporte");
                            const btnHub = document.getElementById("btn-volver-hub");

                            // 🧠 CEREBRO DE NAVEGACIÓN (3 ESTADOS)

                            if (data.estado === "Finalizado_DM" && !data.access_DQ) {
                                // ESTADO: MÁSCARA ROTA (Terminó DM, no tiene DQ)
                                btnNegro.style.display = "none";
                                btnRojo.style.display = "block";
                                btnHub.style.display = "block";
                            } 
                            else if (data.access_DQ === true || data.estado === "Finalizado_DQ") {
                                // ESTADO: SOBERANO (Tiene acceso a DQ o ya lo finalizó)
                                btnNegro.style.display = "block";
                                btnRojo.style.display = "none";
                                btnHub.style.display = "block";
                            }
                            else {
                                // ESTADO: EXPLORADOR (Primera vez haciendo la DM)
                                btnNegro.style.display = "block";
                                btnRojo.style.display = "none";
                                btnHub.style.display = "none";
                            }

                            // GPS (Solo si no ha terminado la fase actual)
                            if (data.estado !== "Finalizado_DM" && data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DM: archivoActual }).catch(err => console.log(err));
                            }

                        } else { window.location.href = archivoExpulsion; }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
