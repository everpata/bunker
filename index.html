<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg" alt="logo"></div>
        <p id="auth-indicator" class="indicator">Acceso / Identificación</p>
        <h1 id="auth-title" class="title">Iniciar expedición.</h1>
        <p id="auth-desc" class="description">Crea tus credenciales de acceso para entrar al búnker.</p>
        
        <div class="form-area">
            <input type="text" id="userName" placeholder="Nombre completo">
            <input type="email" id="userEmail" placeholder="Correo electrónico">
            <input type="password" id="userPass" placeholder="Contraseña">
        </div>

        <button id="btnAuth" class="btn-mando">Crear cuenta &#8594;</button>
        <button id="toggle-auth" class="link-toggle">¿Ya tienes cuenta? <b>Inicia sesión</b></button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- FUNCIÓN ENRUTADORA (EL CEREBRO) ---
        function redirigirSegunProgreso(user) {
            db.collection("usuarios").doc(user.uid).get().then((doc) => {
                if (doc.exists) {
                    const fase = doc.data().fase;
                    
                    // Saltos lógicos según la etiqueta "fase" que guardamos en cada página
                    if (fase === "Quiz Completado") {
                        window.location.href = "mision5.html";
                    } else if (fase === "Video Visto") {
                        window.location.href = "mision4.html";
                    } else if (fase === "Perfil Completado") {
                        window.location.href = "mision2.html";
                    } else {
                        // Si solo está registrado pero no llenó datos de perfil
                        window.location.href = "datos.html";
                    }
                } else {
                    // Si no tiene expediente aún, a llenar datos
                    window.location.href = "datos.html";
                }
            }).catch((error) => {
                console.log("Error al consultar expediente:", error);
                window.location.href = "datos.html"; // Por seguridad, enviarlo al inicio del flujo
            });
        }

        // 1. Detectar si ya hay una sesión activa al abrir la página
        auth.onAuthStateChanged((user) => {
            if (user) {
                redirigirSegunProgreso(user);
            }
        });

        let isLoginMode = false;
        document.getElementById('toggle-auth').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            const nameInput = document.getElementById('userName');
            const title = document.getElementById('auth-title');
            const desc = document.getElementById('auth-desc');
            const btn = document.getElementById('btnAuth');
            const toggleLink = document.getElementById('toggle-auth');

            if (isLoginMode) {
                title.innerText = "Bienvenido de vuelta.";
                desc.innerText = "Introduce tus credenciales para reanudar la misión.";
                btn.innerText = "Acceder →";
                toggleLink.innerHTML = "¿No tienes cuenta? <b>Regístrate</b>";
                nameInput.style.display = "none";
            } else {
                title.innerText = "Iniciar expedición.";
                desc.innerText = "Crea tus credenciales de acceso para entrar al búnker.";
                btn.innerText = "Crear cuenta →";
                toggleLink.innerHTML = "¿Ya tienes cuenta? <b>Inicia sesión</b>";
                nameInput.style.display = "block";
            }
        });

        document.getElementById('btnAuth').addEventListener('click', () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const name = document.getElementById('userName').value;

            if (!email || !pass) { alert("Completa los campos."); return; }

            if (isLoginMode) {
                auth.signInWithEmailAndPassword(email, pass)
                    .then((userCredential) => {
                        redirigirSegunProgreso(userCredential.user);
                    })
                    .catch((err) => alert("Error: " + err.message));
            } else {
                if (!name) { alert("El nombre es obligatorio."); return; }
                auth.createUserWithEmailAndPassword(email, pass)
                    .then((res) => {
                        return db.collection("usuarios").doc(res.user.uid).set({
                            nombre: name,
                            email: email,
                            fase: "Registrado",
                            fechaRegistro: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    })
                    .then(() => { window.location.href = 'datos.html'; })
                    .catch((err) => alert("Error: " + err.message));
            }
        });
    </script>
</body>
</html>
