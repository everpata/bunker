<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Registro</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .logo-container { position: absolute; top: 50px; left: 0; width: 100%; text-align: center; z-index: 10; }
        .logo-container img { height: 60px; width: auto; }
        .content-block { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; box-sizing: border-box; display: flex; flex-direction: column; text-align: center; }
        .indicator { color: #878787; font-size: 11px; font-weight: 600; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 30px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; letter-spacing: -0.8px; }
        .description { color: #878787; font-size: 16px; line-height: 1.5; margin: 0 0 40px 0; }
        input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; font-size: 16px; color: #333333; font-family: inherit; outline: none; background: transparent; text-align: center; margin-bottom: 16px; }
        input:focus { border-bottom: 1px solid #333333; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; margin-top: 40px; }
        .login-link { color: #878787; font-size: 13px; margin-top: 24px; text-decoration: none; }
        @media (max-width: 480px) { .logo-container img { height: 45px; } .title { font-size: 26px; } .description { font-size: 15px; } .content-block { top: 55%; } }
    </style>
</head>
<body>
    <div class="logo-container"><img src="deepmersion.jpeg" alt="logo"></div>
    <div class="content-block">
        <p class="indicator">Acceso / Registro</p>
        <h1 class="title">Iniciar expedición.</h1>
        <p class="description">Crea tus credenciales para entrar al búnker.</p>
        <input type="text" placeholder="Nombre completo">
        <input type="email" placeholder="Correo electrónico">
        <input type="password" placeholder="Contraseña">
        <button onclick="window.location.href='datos.html'" class="btn-mando">Crear cuenta &#8594;</button>
        <a href="#" class="login-link">¿Ya tienes cuenta? <b>Inicia sesión</b></a>
    </div>
</body>
</html>
