<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Registro</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .content-block { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        
        /* Simetría Superior: 30px */
        .logo-container { margin: 0 0 30px -10px; align-self: flex-start; } 
        .logo-container img { height: 60px; width: auto; display: block; }

        .indicator { color: #878787; font-size: 11px; font-weight: 600; margin: 0 0 12px 0; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 30px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; letter-spacing: -0.8px; }
        .description { color: #878787; font-size: 16px; line-height: 1.5; margin: 0 0 32px 0; }
        
        .input-area { width: 100%; display: flex; flex-direction: column; gap: 4px; margin: 0; }
        input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; color: #333333; outline: none; background: transparent; font-size: 16px; font-family: inherit; margin: 0; }
        input::placeholder { color: #878787; opacity: 1; }
        input:focus { border-bottom: 1px solid #333333; }

        /* Simetría Inferior: 30px */
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; -webkit-appearance: none; margin: 30px 0 0 0; }
        .login-link { color: #878787; font-size: 13px; margin-top: 24px; text-decoration: none; align-self: center; }

        @media (max-width: 480px) { 
            .logo-container { margin-bottom: 20px; } 
            .logo-container img { height: 45px; } 
            .title { font-size: 26px; } 
            .btn-mando { margin-top: 20px; } 
        }
    </style>
</head>
<body>
    <div class="content-block">
        <div class="logo-container"><img src="deepmersion.jpeg" alt="logo"></div>
        <p class="indicator">Acceso / Registro</p>
        <h1 class="title">Iniciar expedición.</h1>
        <p class="description">Crea tus credenciales de acceso para entrar al búnker.</p>
        <div class="input-area">
            <input type="text" placeholder="Nombre completo">
            <input type="email" placeholder="Correo electrónico">
            <input type="password" placeholder="Contraseña">
        </div>
        <button onclick="window.location.href='datos.html'" class="btn-mando">Crear cuenta &#8594;</button>
        <a href="#" class="login-link">¿Ya tienes cuenta? <b>Inicia sesión</b></a>
    </div>
</body>
</html>
