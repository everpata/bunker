<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Crear Cuenta</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        
        /* Logo Triplicado y Ajuste Visual */
        .logo-container { position: absolute; top: 45px; left: 45px; z-index: 10; }
        .logo-container img { height: 60px; width: auto; display: block; }
        
        .content-block { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .indicator { color: #878787; font-size: 11px; font-weight: 600; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 28px; font-weight: 700; line-height: 1.1; margin: 0 0 12px 0; letter-spacing: -0.8px; }
        .description { color: #878787; font-size: 16px; line-height: 1.4; margin: 0 0 28px 0; }
        
        /* Inputs Estilo Apple */
        input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; font-size: 16px; color: #333333; font-family: inherit; outline: none; background: transparent; border-radius: 0; margin-bottom: 16px; }
        input::placeholder { color: #878787; opacity: 0.5; }
        input:focus { border-bottom: 1px solid #333333; }

        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; -webkit-appearance: none; margin-top: 10px; }
        
        .login-link { color: #878787; font-size: 13px; text-align: center; margin-top: 20px; text-decoration: none; display: block; }
        .login-link b { color: #333333; }

        @media (max-width: 480px) { 
            .logo-container { top: 35px; left: 38px; } 
            .logo-container img { height: 45px; } 
            .title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="logo-container"><img src="deepmersion.jpeg" alt="deepmersion"></div>

    <div class="content-block">
        <p class="indicator">Acceso / Crear Cuenta</p>
        <h1 class="title">Iniciar proceso.</h1>
        <p class="description">Crea tus credenciales de acceso para entrar al búnker.</p>
      
        <input type="text" placeholder="Nombre completo">
        <input type="email" placeholder="Correo electrónico">
        <input type="password" placeholder="Contraseña">
    
        <button onclick="window.location.href='datos.html'" class="btn-mando">
            Crear cuenta &#8594;
        </button>

        <a href="#" class="login-link">¿Ya tienes cuenta? <b>Inicia sesión</b></a>
    </div>

</body>
</html>
