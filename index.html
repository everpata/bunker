<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Misión 01</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .content-block { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 40px; box-sizing: border-box; display: flex; flex-direction: column; }
        .indicator { color: #878787; font-size: 12px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 32px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; letter-spacing: -0.8px; }
        .description { color: #878787; font-size: 17px; line-height: 1.5; margin: 0 0 32px 0; }
        .video-placeholder { width: 100%; aspect-ratio: 16/9; background: #f2f2f7; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; cursor: pointer; }
        .play-btn { width: 50px; height: 50px; background: #333333; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .play-triangle { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 12px solid #fff; margin-left: 4px; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; -webkit-appearance: none; }
        @media (max-width: 480px) { .content-block { padding: 0 45px; } .title { font-size: 26px; } .description { font-size: 15px; } }
    </style>
</head>
<body>
    <div class="content-block">
        <p class="indicator">Misión 01 / Apertura</p>
        <h1 class="title">La gravedad del silencio.</h1>
        <p class="description">Antes de operar hacia afuera, debemos estabilizar la presión interna.</p>
        <div class="video-placeholder">
            <div class="play-btn"><div class="play-triangle"></div></div>
        </div>
        <button onclick="window.location.href='mision2.html'" class="btn-mando">Continuar &#8594;</button>
    </div>
</body>
</html>
