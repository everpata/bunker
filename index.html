<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Registro</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; }
        
        .logo { margin: 0 0 30px -10px; }
        .logo img { height: 60px; width: auto; display: block; }

        .indicator { font-size: 11px; font-weight: 600; color: #878787; margin: 0 0 12px 0; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { font-size: 30px; font-weight: 700; color: #333333; margin: 0 0 16px 0; line-height: 1.1; letter-spacing: -0.8px; }
        .description { font-size: 16px; color: #878787; margin: 0 0 32px 0; line-height: 1.5; }
        
        .work-area { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; font-size: 16px; color: #333333; background: transparent; outline: none; font-family: inherit; }
        input::placeholder { color: #878787; }
        input:focus { border-bottom: 1px solid #333333; }

        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 30px; -webkit-appearance: none; }
        .link { font-size: 13px; color: #878787; text-decoration: none; align-self: center; margin-top: 24px; }

        @media (max-width: 480px) {
            .logo { margin-bottom: 20px; } .logo img { height: 45px; }
            .title { font-size: 26px; } .description { font-size: 15px; margin-bottom: 24px; }
            .btn-mando { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg" alt="logo"></div>
        <p class="indicator">Acceso / Registro</p>
        <h1 class="title">Iniciar expedición.</h1>
        <p class="description">Crea tus credenciales de acceso para entrar al búnker.</p>
        <div class="work-area">
            <input type="text" placeholder="Nombre completo">
            <input type="email" placeholder="Correo electrónico">
            <input type="password" placeholder="Contraseña">
        </div>
        <button onclick="window.location.href='datos.html'" class="btn-mando">Crear cuenta &#8594;</button>
        <a href="#" class="link">¿Ya tienes cuenta? <b>Inicia sesión</b></a>
    </div>
</body>
</html>
