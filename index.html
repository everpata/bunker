<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Registro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; display: flex; flex-direction: column; align-items: flex-start; }
        .logo { margin: 0 0 30px -10px; }
        .logo img { height: 60px; width: auto; display: block; }
        .indicator { font-size: 11px; font-weight: 600; color: #878787; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { font-size: 30px; font-weight: 700; color: #333333; margin-bottom: 16px; line-height: 1.1; letter-spacing: -0.8px; }
        .description { font-size: 16px; color: #878787; margin-bottom: 32px; line-height: 1.5; }
        .form-area { width: 100%; display: flex; flex-direction: column; }
        input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; font-size: 16px; color: #333333; outline: none; background: transparent; font-family: inherit; }
        input:focus { border-bottom: 1px solid #333333; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 30px; -webkit-appearance: none; }
        .link { font-size: 13px; color: #878787; text-decoration: none; align-self: center; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg" alt="logo"></div>
        <p class="indicator">Acceso / Registro</p>
        <h1 class="title">Iniciar expedición.</h1>
        <p class="description">Crea tus credenciales de acceso para entrar al búnker.</p>
        <div class="form-area">
            <input type="text" id="userName" placeholder="Nombre completo">
            <input type="email" id="userEmail" placeholder="Correo electrónico">
            <input type="password" id="userPass" placeholder="Contraseña">
        </div>
        <button id="btnRegistro" class="btn-mando">Crear cuenta &#8594;</button>
        <a href="#" class="link">¿Ya tienes cuenta? <b>Inicia sesión</b></a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('btnRegistro').addEventListener('click', () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const name = document.getElementById('userName').value;

            if (!email || !pass || !name) { alert("Completa todos los campos."); return; }

            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    return db.collection("usuarios").doc(userCredential.user.uid).set({
                        nombre: name,
                        email: email,
                        fechaRegistro: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => { window.location.href = 'datos.html'; })
                .catch((error) => { alert("Error: " + error.message); });
        });
    </script>
</body>
</html>
