<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Misión 04</title>
    <style>
        /* Bloqueo de scroll y base */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        /* Contenedor central absoluto */
        .content-block {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 460px; 
            padding: 0 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .indicator {
            color: #878787; /* Tu nuevo color de marca para textos secundarios */
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .title {
            color: #333333; /* Solo autoridad en el título */
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
            margin: 0 0 16px 0;
            letter-spacing: -0.8px;
        }

        .description {
            color: #878787; /* Color de marca */
            font-size: 17px;
            line-height: 1.5;
            margin: 0 0 32px 0;
        }

        textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #eaeaea;
            padding: 10px 0;
            font-size: 18px;
            color: #333333; /* El texto que escribe el usuario debe ser legible */
            font-family: inherit;
            resize: none;
            outline: none;
            margin-bottom: 32px;
            background: transparent;
            border-radius: 0;
        }

        textarea::placeholder {
            color: #878787;
            font-style: italic;
            font-size: 16px;
        }

        textarea:focus {
            border-bottom: 1px solid #333333;
        }

        .btn-mando {
            width: 100%;
            background: #333333;
            color: #ffffff;
            border: none;
            padding: 20px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
        }

        /* AJUSTES PARA MÓVIL */
        @media (max-width: 480px) {
            .content-block {
                padding: 0 45px;
            }
            .title {
                font-size: 26px;
                margin-bottom: 12px;
            }
            .description {
                font-size: 15px;
                margin-bottom: 24px;
            }
            .indicator {
                font-size: 11px;
                margin-bottom: 12px;
            }
            textarea {
                font-size: 16px;
                margin-bottom: 24px;
            }
        }

        /* COMPRESIÓN PARA PANTALLAS BAJAS */
        @media (max-height: 670px) and (max-width: 480px) {
            .title { font-size: 23px; }
            .description { font-size: 14px; margin-bottom: 16px; }
            textarea { margin-bottom: 18px; }
        }
    </style>
</head>
<body>

    <div class="content-block">
        <p class="indicator">Misión 01 / Fase de destino</p>
        
        <h1 class="title">La situación de éxito.</h1>
        
        <p class="description">Describe la situación específica en la que tendrías que estar para confirmar que tu inmersión fue un éxito total.</p>
      
        <textarea rows="2" placeholder="Describe tu escenario aquí..."></textarea>
    
        <button class="btn-mando">
            Finalizar reporte &#8594;
        </button>
    </div>

</body>
</html>
