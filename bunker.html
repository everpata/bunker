<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepfall / Búnker de Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    
    <style>
        /* 🚨 HUD DE MÉTRICAS (PROXIMAMENTE EN DEEPQUEST) */
        .stats-hud {
            display: none; /* Se activa dinámicamente */
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #333;
        }
        .hud-item { text-align: center; }
        .hud-value { display: block; font-size: 14px; font-weight: 800; color: #fff; }
        .hud-label { display: block; font-size: 8px; color: #878787; text-transform: uppercase; letter-spacing: 1px; }

        /* ESTILOS GLOBALES */
        #loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #fff; position: fixed; top: 0; left: 0; z-index: 9999; }
        
        /* FORMULARIO PERFIL */
        .iti { width: 100%; margin-top: 10px; }
        .iti__input { border: none !important; border-bottom: 1px solid #eaeaea !important; border-radius: 0 !important; width: 100% !important; padding: 12px 0 12px 50px !important; background: transparent !important; }
        .form-area input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; font-size: 16px; outline: none; margin-bottom: 10px; background: transparent; }

        /* TARJETAS ESPECIALES */
        .card-principio { cursor: pointer; text-align: center; padding: 40px 20px; }
        .img-flotante { width: 120px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* BOTÓN ELÁSTICO (REPORTES) */
        .btn-status-alert { display: none; background-color: #fce8e6 !important; color: #d93025 !important; border: 1px solid #d93025 !important; font-weight: 700; width: 100%; padding: 20px; border-radius: 16px; animation: btnElastic 4s ease-in-out infinite; }
        @keyframes btnElastic { 0%, 100% { padding: 18px 20px; } 50% { padding: 24px 20px; } }

        /* RESPUESTAS BLOQUEADAS */
        textarea.locked { color: #878787; background-color: #f9f9f9; cursor: not-allowed; border-color: #e0e0e0; }
        .btn-disabled { background-color: #f5f5f7 !important; color: #878787 !important; border: 1px solid #e0e0e0 !important; cursor: default !important; }
    </style>
</head>
<body>
    <div id="loading-screen"><img src="DF.png" style="height: 50px;"></div>

    <div class="container" id="bunker-content" style="display: none; padding-top: 40px;">
        <div class="logo" id="ui-logo"><img src="DF.png"></div>
        
        <div id="ui-hud" class="stats-hud">
            <div class="hud-item"><span class="hud-value" id="val-latencia">--</span><span class="hud-label">Latencia</span></div>
            <div class="hud-item"><span class="hud-value" id="val-mando">--</span><span class="hud-label">Mando</span></div>
            <div class="hud-item"><span class="hud-value" id="val-densidad">--</span><span class="hud-label">Densidad</span></div>
        </div>

        <p class="indicator" id="ui-indicator"></p>
        <div class="progress-container" id="ui-progress-wrapper">
            <div class="progress-fill" id="ui-progress"></div>
        </div>
        
        <h1 class="title" id="ui-title"></h1>
        <p class="description" id="ui-desc"></p>
        
        <div id="dynamic-work-area"></div>

        <button id="btn-mando" class="btn-mando"></button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    
    <script src="datos.js"></script>
    <script src="engine.js?v=9"></script>
</body>
</html>
