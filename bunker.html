<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepfall / Sistema Activo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 ESTILOS GLOBALES MAESTROS */
        .btn-status-alert { display: none; background-color: #fce8e6 !important; color: #d93025 !important; border: 1px solid #d93025 !important; font-weight: 700 !important; width: 100%; padding: 20px; border-radius: 16px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 12px rgba(217, 48, 37, 0.1); animation: btnElastic 4s ease-in-out infinite; text-align: center; margin-top: 35px !important; }
        @keyframes btnElastic { 0% { padding-top: 18px; padding-bottom: 18px; } 50% { padding-top: 24px; padding-bottom: 24px; } 100% { padding-top: 18px; padding-bottom: 18px; } }
        #btn-mando, #btn-alerta-reporte, #btn-volver-hub { display: none; }
        #loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #fff; position: fixed; top: 0; left: 0; z-index: 9999; }
        
        /* BLOQUEOS VISUALES */
        textarea.locked { color: #878787; background-color: #f9f9f9; cursor: not-allowed; border-color: #e0e0e0; }
        .quiz-locked .option-btn { pointer-events: none; opacity: 0.7; }
        .quiz-locked .option-btn.selected { opacity: 1; border-color: #333333 !important; color: #333333 !important; font-weight: 700; }
        .btn-disabled { background-color: #f5f5f7 !important; color: #878787 !important; border: 1px solid #e0e0e0 !important; cursor: default !important; box-shadow: none !important; animation: none !important; }

        /* POST VIDEO */
        .post-video-box { background-color: #f5f5f7; border-radius: 16px; padding: 20px; width: 100%; margin-top: 25px; margin-bottom: 10px; box-sizing: border-box; text-align: left; }
        .post-video-box p { font-size: 16px; color: #878787; line-height: 1.6; margin: 0; }
        .post-video-box b { color: #333333; }
    </style>
</head>
<body>
    <div id="loading-screen"><img src="DF.png" class="loading-logo" alt="Cargando..."></div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator" id="ui-indicator"></p>
        <div class="progress-container"><div class="progress-fill" id="ui-progress"></div></div>
        
        <h1 class="title" id="ui-title"></h1>
        <p class="description" id="ui-desc"></p>
        
        <div id="dynamic-work-area"></div>

        <button id="btn-mando" class="btn-mando"></button>
        <button id="btn-alerta-reporte" class="btn-status-alert">AVANZAR AL TRAMO 02 →</button>
        <button id="btn-volver-hub" class="btn-ghost">← Volver al Hub</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <script src="datos.js"></script>
    <script src="engine.js"></script>
</body>
</html>
