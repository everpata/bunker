<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz / Deepfall</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator">Quiz 01</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 60%;"></div>
        </div>
        
        <h1 class="title">Sincronización.</h1>
        <p id="quiz-desc" class="description">¿Qué te detiene hoy?</p>
        
        <div id="quiz-area" class="work-area">
            <button class="option-btn" onclick="this.classList.toggle('selected')">Falta de enfoque.</button>
            <button class="option-btn" onclick="this.classList.toggle('selected')">Ruido externo.</button>
        </div>
        
        <button id="btn-next" class="btn-mando">Sincronizar →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "03_DF_quiz.html";          // GPS: Archivo actual
        const archivoSiguiente = "04_DF_imagen.html";     // Destino al guardar
        const archivoReporte = "08_DF_reportefinal.html"; // Destino si choca contra el final
        const archivoExpulsion = "index.html";            // Destino si detecta intrusos

        // 🔴 ACTUALIZAR: Credenciales de Firebase (Solo si cambias de base de datos)
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                // 1. RASTREO Y CARGA DE DATOS AL INICIAR
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELA: Patea a los finalizados sin pase
                        if (data.estado === "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            window.location.href = archivoReporte; 
                        } else {
                            // Autorizado: Retirar escudo
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // AUTOGUARDADO GPS
                            if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                                userRef.update({ leccion_actual_DF: archivoActual }).catch(err => console.log(err));
                            }
                            
                            // MEMORIA VISUAL: Si ya había respondido esto antes, marca los botones
                            const campoQuiz = "quiz_" + archivoActual.replace(/\./g, "_");
                            if (data[campoQuiz] && Array.isArray(data[campoQuiz])) {
                                const botones = document.querySelectorAll('.option-btn');
                                botones.forEach(btn => {
                                    if (data[campoQuiz].includes(btn.innerText.trim())) {
                                        btn.classList.add('selected');
                                    }
                                });
                            }
                        }
                    } else {
                        window.location.href = archivoExpulsion;
                    }
                }).catch(() => { window.location.href = archivoExpulsion; });

                // 2. GUARDADO DE RESPUESTAS AL AVANZAR
                document.getElementById("btn-next").addEventListener("click", () => {
                    const seleccionados = Array.from(document.querySelectorAll('.option-btn.selected')).map(btn => btn.innerText.trim());
                    const btn = document.getElementById("btn-next");

                    // Validación: Exige al menos una respuesta
                    if (seleccionados.length === 0) {
                        alert("Toma una decisión. Selecciona al menos una opción para continuar.");
                        return;
                    }

                    btn.innerText = "Sincronizando...";
                    btn.disabled = true;

                    // Crea un campo único en Firebase basado en el archivo
                    const nombreCampo = "quiz_" + archivoActual.replace(/\./g, "_");

                    // Guarda el array de respuestas seleccionadas
                    userRef.update({
                        [nombreCampo]: seleccionados
                    }).then(() => {
                        window.location.href = archivoSiguiente;
                    }).catch((error) => {
                        alert("Error de sincronización: " + error.message);
                        btn.innerText = "Sincronizar →";
                        btn.disabled = false;
                    });
                });

            } else {
                window.location.href = archivoExpulsion;
            }
        });
    </script>
</body>
</html>
