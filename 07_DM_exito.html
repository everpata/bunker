<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Cumplida / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { height: 100%; margin: 0; display: flex; align-items: center; justify-content: center; background-color: #ffffff; }
        .container { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; min-height: auto; width: 100%; }
        .victory-img { width: 100%; border-radius: 12px; margin-bottom: 20px; animation: floatIn 1.5s ease forwards; }
        .victory-card { opacity: 0; animation: floatIn 1s ease forwards 1s; width: 100%; box-sizing: border-box; }
        @keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: sans-serif; color: #333; background: #fff; position: absolute; z-index: 9999;">
        <h2 id="status-text" style="font-size: 18px; margin-bottom: 10px;">Verificando estatus operativo...</h2>
        <p id="sub-text" style="font-size: 14px; color: #878787;">Conectando con el búnker.</p>
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        <p class="indicator">Tramo 02 Completado</p>
        
        <h1 class="title">Inmersión Superada.</h1>

        <img src="victoria.jpeg" class="victory-img">

        <div class="work-area card victory-card">
            <p class="text-base">Has asimilado las herramientas del Anarquista. Tu sistema está blindado contra el ruido externo. <b>Estás listo para el ascenso final.</b></p>
        </div>

        <button class="btn-mando" onclick="window.location.href='08_DM_reportefinal.html'">Abrir Reporte de Estatus →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "07_DM_exito.html";

        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DM === true) {
                            // ES VIP
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";
                            
                            // QUEMAMOS LAS NAVES DEL TRAMO 02
                            userRef.update({
                                fase: "Finalizado_DM",
                                leccion_actual_DM: archivoActual
                            });
                        } else {
                            // NO HA PAGADO
                            document.getElementById("status-text").innerText = "Acceso denegado.";
                            document.getElementById("sub-text").innerText = "Redirigiendo a tu zona autorizada...";
                            setTimeout(() => { window.location.href = "index.html"; }, 1500);
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
