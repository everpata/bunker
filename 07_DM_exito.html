<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éxito / Deepmersion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 AJUSTE DE POSICIONAMIENTO MÓVIL V5.8 */
        html, body { 
            height: auto; 
            min-height: 100%; 
            margin: 0; 
            background-color: #ffffff; 
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Safe area superior para que el logo respire en móviles */
            padding: 60px 0 40px 0; 
        }

        .victory-img { 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            animation: floatIn 1.5s ease forwards; 
            display: block;
        }

        .victory-card { 
            opacity: 0; 
            animation: floatIn 1s ease forwards 1s; 
            width: 100%;
            text-align: center; /* Forzamos centrado de texto de la tarjeta */
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* Botón con margen superior estándar V4.0 */
        #btn-continuar { 
            display: none; 
            margin-top: 35px !important; 
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DM.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        <p class="indicator">Tramo 02 Completado</p>
        
        <h1 class="title">Inmersión Finalizada.</h1>

        <img src="victoria_dm.jpeg" class="victory-img" alt="Éxito Operativo">

        <div class="work-area card victory-card">
            <p class="text-base">Has descendido a las profundidades de tu propia estructura. El ruido externo ha sido silenciado. <b>Es hora de enfrentar el diagnóstico de la Inmersión.</b></p>
        </div>

        <button id="btn-continuar" class="btn-mando">Abrir Reporte de Inmersión →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoSiguiente = "08_DM_reportefinal.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // Sellar estado DM
                        if (data.estado !== "Finalizado_DM" && data.estado !== "Finalizado_DQ") {
                            userRef.update({ 
                                estado: "Finalizado_DM", 
                                leccion_actual_DM: "07_DM_exito.html" 
                            });
                        }

                        document.getElementById("loading-screen").style.display = "none";
                        document.getElementById("bunker-content").style.display = "flex";
                        document.getElementById("btn-continuar").style.display = "block";
                        
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
