<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: sans-serif; color: #333; background: #fff; position: absolute; z-index: 9999;">
        <h2 id="status-text" style="font-size: 18px; margin-bottom: 10px;">Verificando pase VIP...</h2>
        <p id="sub-text" style="font-size: 14px; color: #878787;">Conectando con el búnker.</p>
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        <p class="indicator">Módulo 01 / DM</p>
        <div class="progress-container"><div class="progress-fill" style="width: 60%;"></div></div>
        
        <h1 class="title">Análisis Visual.</h1>
        <p class="description">Identifica las mecánicas de tu Anarquista interior.</p>
        
        <div class="work-area">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>
        
        <button class="btn-mando" onclick="window.location.href='06_DM_principio.html'">He visto el video →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "05_DM_video.html";

        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DM === true) {
                            // ES VIP
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";
                            userRef.update({ leccion_actual_DM: archivoActual }).catch(err => console.log(err));
                        } else {
                            // NO HA PAGADO
                            document.getElementById("status-text").innerText = "Acceso denegado.";
                            document.getElementById("sub-text").innerText = "Redirigiendo a tu zona autorizada...";
                            setTimeout(() => { window.location.href = "index.html"; }, 1500);
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
