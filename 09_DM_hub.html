<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub DM / Deepmersion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 BANNER TÁCTICO FLOTANTE */
        #banner-upsell {
            display: none; position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 440px; background-color: #333333; color: #ffffff; 
            text-align: center; padding: 12px; font-size: 10px; font-weight: 800; 
            z-index: 10001; cursor: pointer; border-radius: 0 0 10px 10px;
            letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: slideDown 0.6s ease;
        }
        @keyframes slideDown { from { transform: translate(-50%, -100%); } to { transform: translate(-50%, 0); } }
        body.with-banner .container { margin-top: 65px !important; }

        html, body { height: 100%; margin: 0; background-color: #ffffff; }
        body { display: flex; align-items: center; justify-content: center; }
        .container { display: flex; flex-direction: column; width: 100%; justify-content: flex-start; padding-top: 40px; }
        .hub-grid { width: 100%; display: grid; gap: 12px; }
        .lesson-card { background: #f5f5f7; border: 1px solid #e0e0e0; border-radius: 12px; padding: 18px; text-decoration: none; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-secundario { width: 100%; background: transparent; color: #333; border: 1px solid #ccc; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        #loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #fff; position: absolute; top: 0; left: 0; z-index: 9999; }
    </style>
</head>
<body>
    <div id="banner-upsell" onclick="window.location.href='08_DM_reportefinal.html'">
        ⚠️ ESTATUS: INCOMPLETO. CLIC PARA ASCENDER AL DEEPQUEST (T03) →
    </div>

    <div id="loading-screen"><img src="DM.png" style="height: 60px;"></div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        <p class="indicator">Centro de Mando / Tramo 02</p>
        <h1 class="title">Inmersión.</h1>
        <div class="hub-grid">
            <a href="01_DM_texto.html" class="lesson-card"><b>01. El Anarquista</b></a>
            </div>
        <button id="btn-retorno" class="btn-secundario">← Volver al Reporte</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        document.getElementById("btn-retorno").onclick = () => { window.location.href = "08_DM_reportefinal.html"; };
        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.access_DM) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";
                            // 🚨 ACTIVAR BANNER SI NO TIENE DQ
                            if (data.estado === "Finalizado_DM" && !data.access_DQ) {
                                document.getElementById("banner-upsell").style.display = "block";
                                document.body.classList.add("with-banner");
                            }
                        } else { window.location.href = "index.html"; }
                    }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
