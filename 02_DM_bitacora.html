<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        <p class="indicator">Reporte / Inmersión</p>
        <div class="progress-container"><div class="progress-fill" style="width: 15%;"></div></div>
        <h1 class="title">Análisis Crítico.</h1>
        <p id="log-desc" class="description">Documenta la fractura de tu máscara.</p>
        
        <div id="log-area" class="work-area card">
            <textarea id="user-reflection" placeholder="Escribe aquí..."></textarea>
        </div>
        
        <button id="btn-next" class="btn-mando">Archivar reporte →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "02_DM_bitacora.html";
        const siguienteArchivo = "03_DM_quiz.html"; // Ajustar al siguiente

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELAS TRAMO 02
                        if (data.access_DM !== true) { window.location.href = "21_DF_reporte_final.html"; return; }
                        if (data.fase === "Finalizado_DM") { window.location.href = "21_DM_reporte_final.html"; return; }

                        // AUTOGUARDADO TRAMO 02
                        userRef.update({ leccion_actual_DM: archivoActual });
                        
                        const campoBitacora = "bitacora_" + archivoActual.replace(/\./g, "_");
                        if (data[campoBitacora]) document.getElementById("user-reflection").value = data[campoBitacora];
                    }
                });

                document.getElementById("btn-next").onclick = function() {
                    const textoUsuario = document.getElementById("user-reflection").value;
                    const btn = document.getElementById("btn-next");
                    if (textoUsuario.trim() === "") { alert("La inmersión requiere registro."); return; }

                    btn.innerText = "Guardando...";
                    btn.disabled = true;

                    const nombreCampo = "bitacora_" + archivoActual.replace(/\./g, "_");
                    userRef.update({ [nombreCampo]: textoUsuario }).then(() => {
                        window.location.href = siguienteArchivo;
                    });
                };
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
