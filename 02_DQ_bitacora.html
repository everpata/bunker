<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: sans-serif; color: #333; background: #fff; position: absolute; z-index: 9999;">
        <h2 id="status-text" style="font-size: 18px; margin-bottom: 10px;">Verificando pase ULTRA-VIP...</h2>
        <p id="sub-text" style="font-size: 14px; color: #878787;">Conectando con la cúspide.</p>
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Reporte / Deepquest</p>
        <div class="progress-container"><div class="progress-fill" style="width: 15%;"></div></div>
        <h1 class="title">Decreto.</h1>
        <p id="log-desc" class="description">Establece tu primera ley operativa.</p>
        
        <div id="log-area" class="work-area card">
            <textarea id="user-reflection" placeholder="Escribe aquí..."></textarea>
        </div>
        
        <button id="btn-next" class="btn-mando">Archivar decreto →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "02_DQ_bitacora.html";
        const siguienteArchivo = "03_DQ_quiz.html"; 
        const archivoDeVenta = "index.html";

        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            if (data.fase !== "Finalizado_DQ") { userRef.update({ leccion_actual_DQ: archivoActual }); }
                            
                            const campoBitacora = "bitacora_" + archivoActual.replace(/\./g, "_");
                            const textArea = document.getElementById("user-reflection");
                            const btn = document.getElementById("btn-next");

                            if (data[campoBitacora]) {
                                textArea.value = data[campoBitacora];
                                textArea.readOnly = true; textArea.style.opacity = "0.7"; textArea.style.cursor = "not-allowed";
                                btn.innerText = "Continuar →";
                                btn.onclick = function() { window.location.href = siguienteArchivo; };
                            } else {
                                btn.onclick = function() {
                                    const textoUsuario = textArea.value;
                                    if (textoUsuario.trim() === "") { alert("El Rey debe dictar su ley."); return; }
                                    btn.innerText = "Guardando..."; btn.disabled = true;
                                    userRef.update({ [campoBitacora]: textoUsuario }).then(() => { window.location.href = siguienteArchivo; });
                                };
                            }
                        } else {
                            document.getElementById("status-text").innerText = "Acceso denegado.";
                            document.getElementById("sub-text").innerText = "Redirigiendo a tu estatus operativo...";
                            setTimeout(() => { window.location.href = archivoDeVenta; }, 1500);
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
