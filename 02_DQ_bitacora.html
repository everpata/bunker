<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 AJUSTES ESPECÍFICOS DQ V4.9 */
        textarea.locked {
            color: #b0b0b0;
            cursor: not-allowed;
            border-color: #eee;
        }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* 🔒 BLOQUEO RADICAL DE FUGA: Oculto por defecto con !important */
        #btn-next { display: none; }
        #btn-hub { display: none !important; margin-top: 20px !important; }

        /* Ajuste de margen para consistencia V4.0 */
        #btn-next { margin-top: 35px !important; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Reporte / Deepquest</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 25%;"></div>
        </div>
        
        <h1 class="title">Decreto.</h1>
        <p id="log-desc" class="description">Establece tu primera ley operativa.</p>
        
        <div id="log-area" class="work-area card">
            <textarea id="user-reflection" placeholder="Escribe aquí tu ley soberana..."></textarea>
        </div>
        
        <button id="btn-next" class="btn-mando">Archivar decreto →</button>
        <button id="btn-hub" class="btn-ghost">← Volver al Hub de la Cúspide</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "02_DQ_bitacora.html"; 
        const archivoSiguiente = "03_DQ_quiz.html"; 
        const archivoHub = "09_DQ_hub.html"; 
        const archivoExpulsion = "08_DM_reportefinal.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 1. FILTRO SOBERANO
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            const textArea = document.getElementById("user-reflection");
                            const btnNext = document.getElementById("btn-next");
                            const btnHub = document.getElementById("btn-hub");
                            const campoBitacora = "bitacora_" + archivoActual.replace(/\./g, "_");

                            // 🧠 CEREBRO DE NAVEGACIÓN V4.9
                            // Paso A: Manejo del contenido de la bitácora
                            if (data[campoBitacora]) {
                                textArea.value = data[campoBitacora];
                                textArea.readOnly = true;
                                textArea.classList.add("locked");
                                btnNext.innerText = "Continuar →";
                            }

                            // Paso B: Mostrar botón de continuar (Siempre visible para VIP)
                            btnNext.style.display = "block";
                            btnNext.onclick = () => {
                                if (data[campoBitacora]) {
                                    window.location.href = archivoSiguiente;
                                } else {
                                    ejecutarGuardado(userRef, textArea, btnNext);
                                }
                            };

                            // Paso C: 🔒 EL CANDADO DEL HUB (Solo para Graduados)
                            if (data.estado === "Finalizado_DQ") {
                                btnHub.style.setProperty('display', 'block', 'important');
                                btnHub.onclick = () => { window.location.href = archivoHub; };
                            } else {
                                btnHub.style.setProperty('display', 'none', 'important');
                            }

                            // GPS DQ (Solo primera vuelta)
                            if (data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DQ: archivoActual });
                            }

                        } else { window.location.href = archivoExpulsion; }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });

        function ejecutarGuardado(userRef, textArea, btn) {
            const texto = textArea.value;
            if (texto.trim() === "") {
                alert("El Rey debe dictar su ley. No dejes el decreto vacío.");
                return;
            }
            btn.innerText = "Archivando...";
            btn.disabled = true;
            const campo = "bitacora_" + archivoActual.replace(/\./g, "_");
            userRef.update({ [campo]: texto }).then(() => {
                window.location.href = archivoSiguiente;
            });
        }
    </script>
</body>
</html>
