<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo para el escudo de carga minimalista */
        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Reporte / Deepquest</p>
        <div class="progress-container"><div class="progress-fill" style="width: 15%;"></div></div>
        <h1 class="title">Decreto.</h1>
        <p id="log-desc" class="description">Establece tu primera ley operativa.</p>
        
        <div id="log-area" class="work-area card">
            <textarea id="user-reflection" placeholder="Escribe aquí..."></textarea>
        </div>
        
        <button id="btn-next" class="btn-mando">Archivar decreto →</button>
        <button id="btn-hub" class="btn-mando" style="display: none; background: transparent; color: #878787; border: 1px solid #eaeaea; margin-top: 15px;">Regresar a la Cúspide</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "02_DQ_bitacora.html";        // GPS Actual
        const archivoSiguiente = "03_DQ_quiz.html";         // Destino al guardar
        const archivoHub = "09_DQ_hub.html";                // Centro de mando DQ
        const archivoExpulsion = "08_DM_reportefinal.html"; // Fallo de pase ULTRA-VIP

        // 🔴 ACTUALIZAR: Credenciales de Firebase
        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        // MOTOR DE SEGURIDAD ULTRA-VIP
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DQ === true) {
                            // Autorizado: Mostrar contenido
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // Revelar Botón Hub si ya es un Rey graduado
                            if (data.estado === "Finalizado_DQ") {
                                document.getElementById("btn-hub").style.display = "block";
                                document.getElementById("btn-hub").onclick = () => { window.location.href = archivoHub; };
                            }

                            // GPS (Solo si está cursando por primera vez)
                            if (data.estado !== "Finalizado_DQ") { 
                                userRef.update({ leccion_actual_DQ: archivoActual }).catch(err => console.log(err)); 
                            }
                            
                            // LÓGICA DE RECUPERACIÓN / GUARDADO
                            const campoBitacora = "bitacora_" + archivoActual.replace(/\./g, "_");
                            const textArea = document.getElementById("user-reflection");
                            const btn = document.getElementById("btn-next");

                            // Si ya hay un decreto archivado...
                            if (data[campoBitacora]) {
                                textArea.value = data[campoBitacora];
                                textArea.readOnly = true; 
                                textArea.style.opacity = "0.7"; 
                                textArea.style.cursor = "not-allowed";
                                btn.innerText = "Continuar →";
                                btn.onclick = () => { window.location.href = archivoSiguiente; };
                            } 
                            // Si es nuevo...
                            else {
                                btn.onclick = () => {
                                    const textoUsuario = textArea.value;
                                    if (textoUsuario.trim() === "") { 
                                        alert("El Rey debe dictar su ley. No dejes el decreto vacío."); 
                                        return; 
                                    }
                                    
                                    btn.innerText = "Sincronizando..."; 
                                    btn.disabled = true;
                                    
                                    userRef.update({ [campoBitacora]: textoUsuario }).then(() => { 
                                        window.location.href = archivoSiguiente; 
                                    }).catch(err => {
                                        alert("Error: " + err.message);
                                        btn.disabled = false;
                                        btn.innerText = "Archivar decreto →";
                                    });
                                };
                            }
                        } else {
                            // No es ULTRA-VIP: Expulsión
                            window.location.href = archivoExpulsion;
                        }
                    } else { window.location.href = "index.html"; }
                }).catch(() => { window.location.href = "index.html"; });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
