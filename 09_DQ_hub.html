<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub DQ / Deepquest</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hub-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 0; }
        .lesson-card { background: #f5f5f7; border: 1px solid #e0e0e0; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #333; transition: all 0.3s; }
        .lesson-card:hover { border-color: #333; background: #fff; transform: translateY(-2px); }
        .lesson-info b { display: block; font-size: 14px; margin-bottom: 4px; }
        .lesson-info span { font-size: 12px; color: #878787; }
    </style>
</head>
<body>
    <div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: sans-serif; color: #333; background: #fff; position: absolute; z-index: 9999;">
        <h2 id="status-text" style="font-size: 18px; margin-bottom: 10px;">Verificando pase ULTRA-VIP...</h2>
        <p id="sub-text" style="font-size: 14px; color: #878787;">Cargando centro de mando.</p>
    </div>

    <div class="container" id="bunker-content" style="display: none; justify-content: flex-start; padding-top: 40px; overflow-y: auto;">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        <p class="indicator">Centro de Mando / Tramo 03</p>
        <h1 class="title">Deepquest.</h1>
        <p class="description">Accede a tus protocolos de dominio.</p>

        <div class="hub-grid">
            <a href="01_DQ_texto.html" class="lesson-card">
                <div class="lesson-info"><b>01. El Rey</b><span>Protocolo de dominio</span></div>
            </a>
            <a href="02_DQ_bitacora.html" class="lesson-card">
                <div class="lesson-info"><b>02. Decreto</b><span>Establecimiento de límites</span></div>
            </a>
            <a href="03_DQ_quiz.html" class="lesson-card">
                <div class="lesson-info"><b>03. Sincronización</b><span>Evaluación táctica</span></div>
            </a>
        </div>

        <button class="btn-mando" onclick="window.location.href='08_DQ_reportefinal.html'" style="margin-top: 30px; background: transparent; color: #333; border: 1px solid #333;">← Volver al Reporte Definitivo</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        const archivoDeVenta = "index.html";

        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        if (doc.data().access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";
                        } else {
                            document.getElementById("status-text").innerText = "Acceso denegado.";
                            document.getElementById("sub-text").innerText = "Redirigiendo a tu estatus operativo...";
                            setTimeout(() => { window.location.href = archivoDeVenta; }, 1500);
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
