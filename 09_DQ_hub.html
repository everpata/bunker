<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub DQ / Deepquest</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 ESTÉTICA DE PRECISIÓN V4.1 */
        .hub-grid { 
            width: 100%; display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 0; 
        }
        
        .lesson-card { 
            background: #f5f5f7; border: 1px solid #e0e0e0; border-radius: 16px; 
            padding: 22px; display: flex; align-items: center; justify-content: space-between; 
            text-decoration: none; color: #333; transition: all 0.3s; 
        }
        .lesson-card:hover { border-color: #333; background: #fff; transform: translateY(-2px); }
        
        .lesson-info b { display: block; font-size: 15px; margin-bottom: 4px; color: #333; }
        .lesson-info span { font-size: 12px; color: #878787; font-weight: 500; }

        /* 🎯 FIX DE ESPACIADO: 35px tras el grid de tarjetas */
        #btn-reporte-dq {
            margin-top: 35px !important;
        }

        /* 🎯 FIX DE ESPACIADO: 20px tras el botón principal */
        #btn-volver-dm {
            margin-top: 20px !important;
        }

        #loading-screen { 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; background: #fff; 
            position: fixed; top: 0; left: 0; z-index: 9999; 
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Centro de Mando / Tramo 03</p>
        <h1 class="title">La Cúspide.</h1>
        <p class="description">Protocolos finales de soberanía absoluta.</p>

        <div class="hub-grid">
            <a href="01_DQ_texto.html" class="lesson-card">
                <div class="lesson-info"><b>01. La Brújula del Rey</b><span>Protocolo de mando</span></div>
                <span style="color: #ccc;">→</span>
            </a>
            <a href="02_DQ_bitacora.html" class="lesson-card">
                <div class="lesson-info"><b>02. Mesa Táctica</b><span>Análisis de soberanía</span></div>
                <span style="color: #ccc;">→</span>
            </a>
            <a href="03_DQ_quiz.html" class="lesson-card">
                <div class="lesson-info"><b>03. Blindaje Final</b><span>Sincronización de núcleo</span></div>
                <span style="color: #ccc;">→</span>
            </a>
        </div>

        <button id="btn-reporte-dq" class="btn-mando">
            Revisar el reporte final →
        </button>
        
        <button id="btn-volver-dm" class="btn-ghost">
            ← Revisar herramientas del Anarquista
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <script>
        const rutaReporteDQ = "08_DQ_reportefinal.html";
        const rutaHubDM = "09_DM_hub.html";

        document.getElementById("btn-reporte-dq").onclick = () => { window.location.href = rutaReporteDQ; };
        document.getElementById("btn-volver-dm").onclick = () => { window.location.href = rutaHubDM; };

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 🔒 PROTECCIÓN VIP: Solo acceso si tiene DQ desbloqueado
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";
                        } else { 
                            // Expulsión al reporte DM si es un intruso
                            window.location.href = "08_DM_reportefinal.html"; 
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
