<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Principio / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS DE REPASO */
        
        .btn-status-alert {
            display: none; 
            background-color: #fce8e6 !important;
            color: #d93025 !important;
            border: 1px solid #d93025 !important;
            font-weight: 700 !important;
            width: 100%;
            padding: 20px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(217, 48, 37, 0.1);
            animation: btnElastic 4s ease-in-out infinite;
            text-align: center;
            margin-top: 35px;
        }

        @keyframes btnElastic {
            0% { padding-top: 18px; padding-bottom: 18px; }
            50% { padding-top: 24px; padding-bottom: 24px; }
            100% { padding-top: 18px; padding-bottom: 18px; }
        }

        .btn-ghost {
            display: none; 
            background: transparent;
            border: none;
            color: #878787;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            text-align: center;
            font-family: inherit;
            transition: color 0.3s;
        }
        .btn-ghost:hover { color: #333; }

        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DM.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        
        <div id="pantalla-reliquia" class="interruption-screen">
            <img src="hacha.png" class="relic-image">
            <p class="indicator">Toca para desenterrar la regla operativa</p>
        </div>
        
        <div class="revelation-screen">
            <div class="logo"><img src="DM.png"></div>
            <p class="indicator">Regla I / DM</p>
            
            <div class="work-area card">
                <span class="principle-statement">"La densidad no se evade, se conquista."</span>
                <p class="text-base">El peso de la realidad es tu única ventaja injusta.</p>
            </div>
            
            <div id="nav-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                
                <button id="btn-continuar" class="btn-mando">Asimilado →</button>
                
                <button id="id-alerta-reporte" class="btn-status-alert">REVISAR REPORTE DE DAÑOS →</button>
                
                <button id="id-volver-hub" class="btn-ghost">← Volver al Hub</button>

            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // PANEL DE ENRUTAMIENTO
        const archivoActual = "06_DM_principios.html"; 
        const archivoSiguiente = "07_DM_exito.html"; 
        const archivoHub = "09_DM_hub.html"; 
        const archivoReporte = "08_DM_reportefinal.html";
        const archivoExpulsion = "index.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. Lógica de Revelación
        document.getElementById("pantalla-reliquia").onclick = () => {
            document.body.classList.add('revealed');
        };

        // 2. Asignación de Eventos Navegación
        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("id-alerta-reporte").onclick = () => { window.location.href = archivoReporte; };
        document.getElementById("id-volver-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DM === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "block";

                            // 🚨 LÓGICA DE REPASO (MÁSCARA ROTA)
                            if (data.estado === "Finalizado_DM" && !data.access_DQ) {
                                document.getElementById("btn-continuar").style.display = "none";
                                document.getElementById("id-alerta-reporte").style.display = "block";
                                document.getElementById("id-volver-hub").style.display = "block";
                            } 
                            else if (data.access_DQ === true) {
                                document.getElementById("id-volver-hub").style.display = "block";
                            }

                            // GPS (Solo primera vuelta)
                            if (data.estado !== "Finalizado_DM" && data.estado !== "Finalizado_DQ" && !data.access_DQ) {
                                userRef.update({ leccion_actual_DM: archivoActual }).catch(err => console.log(err));
                            }

                        } else {
                            window.location.href = archivoExpulsion; 
                        }
                    } else {
                        window.location.href = "index.html";
                    }
                }).catch(() => { window.location.href = "index.html"; });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
