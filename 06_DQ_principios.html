<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Principio / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo para el escudo de carga minimalista */
        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        
        <div id="pantalla-reliquia" class="interruption-screen">
            <img src="hacha.png" class="relic-image">
            <p class="indicator">Toca para desenterrar el decreto</p>
        </div>
        
        <div class="revelation-screen">
            <div class="logo"><img src="DQ.png"></div>
            <p class="indicator">Regla I / Deepquest</p>
            
            <div class="work-area card">
                <span class="principle-statement">"El Rey no pide permiso, establece el estándar."</span>
                <p class="text-base">Tu entorno se adapta a tu densidad, no al revés.</p>
            </div>
            
            <button id="btn-continuar" class="btn-mando">Asimilado →</button>
            
            <button id="btn-hub" class="btn-mando" style="display: none; background: transparent; color: #878787; border: 1px solid #eaeaea; margin-top: 15px;">Regresar a la Cúspide</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "06_DQ_principios.html";    // GPS Actual
        const archivoSiguiente = "07_DQ_exito.html";      // Destino al avanzar
        const archivoHub = "09_DQ_hub.html";              // Centro de mando DQ
        const archivoExpulsion = "08_DM_reportefinal.html"; // Destino si no es ULTRA-VIP

        // 🔴 ACTUALIZAR: Credenciales de Firebase
        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        // 1. LÓGICA DE INTERFAZ Y BOTONES
        // Función de revelación centralizada
        document.getElementById("pantalla-reliquia").addEventListener("click", () => {
            document.body.classList.add('revealed');
        });

        document.getElementById("btn-continuar").addEventListener("click", () => {
            window.location.href = archivoSiguiente;
        });

        document.getElementById("btn-hub").addEventListener("click", () => {
            window.location.href = archivoHub;
        });

        // 2. MOTOR DE SEGURIDAD ULTRA-VIP
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // VALIDACIÓN ULTRA-VIP
                        if (data.access_DQ === true) {
                            // Autorizado: Quitar escudo de carga
                            document.getElementById("loading-screen").style.display = "none";
                            // OJO: display block para que la tarjeta de revelación funcione con CSS
                            document.getElementById("bunker-content").style.display = "block";

                            // Revelar Botón Fantasma para Reyes graduados
                            if (data.estado === "Finalizado_DQ") {
                                document.getElementById("btn-hub").style.display = "block";
                            }

                            // GPS (Solo si está cursando por primera vez)
                            if (data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DQ: archivoActual }).catch(err => console.log(err));
                            }
                        } else {
                            // No es ULTRA-VIP: Expulsión
                            window.location.href = archivoExpulsion;
                        }
                    } else { window.location.href = "index.html"; }
                }).catch(() => { window.location.href = "index.html"; });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
