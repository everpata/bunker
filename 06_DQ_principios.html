<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Principio / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <script>function reveal(){document.body.classList.add('revealed');}</script>
</head>
<body>
    <div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: sans-serif; color: #333; background: #fff; position: absolute; z-index: 9999;">
        <h2 id="status-text" style="font-size: 18px; margin-bottom: 10px;">Verificando pase ULTRA-VIP...</h2>
        <p id="sub-text" style="font-size: 14px; color: #878787;">Conectando con la cúspide.</p>
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="interruption-screen" onclick="reveal()">
            <img src="hacha.png" class="relic-image">
            <p class="indicator">Toca para desenterrar el decreto</p>
        </div>
        
        <div class="revelation-screen">
            <div class="logo"><img src="deepmersion.jpeg"></div>
            <p class="indicator">Regla I / Deepquest</p>
            
            <div class="work-area card">
                <span class="principle-statement">"El Rey no pide permiso, establece el estándar."</span>
                <p class="text-base">Tu entorno se adapta a tu densidad, no al revés.</p>
            </div>
            
            <button class="btn-mando" onclick="window.location.href='07_DQ_exito.html'">Asimilado →</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "06_DQ_principios.html";
        const archivoDeVenta = "index.html";

        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DQ === true) {
                            // ES VIP
                            document.getElementById("loading-screen").style.display = "none";
                            // OJO: display block para que la tarjeta de revelación funcione con CSS
                            document.getElementById("bunker-content").style.display = "block";
                            if (data.fase !== "Finalizado_DQ") { userRef.update({ leccion_actual_DQ: archivoActual }); }
                        } else {
                            // NO HA PAGADO
                            document.getElementById("status-text").innerText = "Acceso denegado.";
                            document.getElementById("sub-text").innerText = "Redirigiendo a tu estatus operativo...";
                            setTimeout(() => { window.location.href = archivoDeVenta; }, 1500);
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
