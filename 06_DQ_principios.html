<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Principio / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 AJUSTES ESPECÍFICOS DQ */
        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* Ocultar botones inicialmente para el cerebro de navegación */
        #btn-continuar, #btn-hub { display: none; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        
        <div id="pantalla-reliquia" class="interruption-screen">
            <img src="hacha.png" class="relic-image">
            <p class="indicator">Toca para desenterrar el decreto</p>
        </div>
        
        <div class="revelation-screen">
            <div class="logo"><img src="DQ.png"></div>
            <p class="indicator">Regla I / Cúspide</p>
            
            <div class="work-area card">
                <span class="principle-statement">"El Rey no pide permiso, establece el estándar."</span>
                <p class="text-base">Tu entorno se adapta a tu densidad, no al revés.</p>
            </div>
            
            <button id="btn-continuar" class="btn-mando">Asimilado →</button>
            
            <button id="btn-hub" class="btn-ghost">← Volver al Hub de la Cúspide</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "06_DQ_principios.html"; 
        const archivoSiguiente = "07_DQ_exito.html"; 
        const archivoHub = "09_DQ_hub.html"; 
        const archivoExpulsion = "08_DM_reportefinal.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        // 1. Lógica de Interfaz
        document.getElementById("pantalla-reliquia").onclick = () => {
            document.body.classList.add('revealed');
        };

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 1. FILTRO SOBERANO
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            // Se usa block para que la lógica de revelación CSS funcione correctamente
                            document.getElementById("bunker-content").style.display = "block";

                            const btnNext = document.getElementById("btn-continuar");
                            const btnHub = document.getElementById("btn-hub");

                            // 🧠 CEREBRO DE NAVEGACIÓN DQ
                            // El Hub siempre está disponible para el estatus Soberano
                            btnNext.style.display = "block";
                            btnHub.style.display = "block";

                            // GPS DQ (Solo primera vuelta)
                            if (data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DQ: archivoActual }).catch(err => console.log(err));
                            }

                        } else {
                            window.location.href = archivoExpulsion; 
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
