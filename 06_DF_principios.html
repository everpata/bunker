<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Principio III / Deepfall</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        
        <div id="pantalla-reliquia" class="interruption-screen">
            <img src="hacha.png" class="relic-image">
            <p class="indicator">Toca para desenterrar el Principio III</p>
        </div>
        
        <div class="revelation-screen">
            <div class="logo"><img src="DF.png"></div>
            
            <p class="indicator">Principio III / 10</p>
            
            <div class="work-area card">
                <span class="principle-statement">"Afilamos el hacha aunque no vayamos a cortar ningún árbol."</span>
                <p class="text-base">El entrenamiento es el estado natural del hombre profundo.</p>
            </div>
            
            <button id="btn-continuar" class="btn-mando">Asimilado →</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "06_DF_principios.html";    // GPS: Archivo actual
        const archivoSiguiente = "07_DF_exito.html";      // Destino al dar clic en Asimilado
        const archivoReporte = "08_DF_reportefinal.html"; // Destino si choca contra el final
        const archivoExpulsion = "index.html";            // Destino si detecta intrusos

        // 🔴 ACTUALIZAR: Credenciales de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. LÓGICA DE INTERFAZ Y BOTONES
        // Mecánica de revelación al tocar la reliquia
        document.getElementById("pantalla-reliquia").addEventListener("click", () => {
            document.body.classList.add('revealed');
        });

        // Enrutamiento del botón final
        document.getElementById("btn-continuar").addEventListener("click", () => {
            window.location.href = archivoSiguiente;
        });

        // 2. MOTOR DE SEGURIDAD Y RASTREO
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELA: Si ya terminó el Tramo 01 y no ha pagado, lo expulsa a ventas
                        if (data.estado === "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            window.location.href = archivoReporte; 
                        } else {
                            // Autorizado: Quitar escudo de carga
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "block";

                            // AUTOGUARDADO GPS: Solo se activa si es su primera vez cursando
                            if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                                userRef.update({ leccion_actual_DF: archivoActual })
                                    .catch((err) => console.log("Error guardando coordenadas...", err));
                            }
                        }
                    } else {
                        window.location.href = archivoExpulsion;
                    }
                }).catch(() => { window.location.href = archivoExpulsion; });
            } else {
                window.location.href = archivoExpulsion;
            }
        });
    </script>
</body>
</html>
