<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }

    .container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; display: flex; flex-direction: column; align-items: flex-start; }

    /* LOGO: Offset -10px */
    .logo { margin: 0 0 30px -10px; align-self: flex-start; }
    .logo img { height: 60px; width: auto; display: block; }

    /* TIPOGRAFÍA */
    .indicator { font-size: 11px; font-weight: 600; color: #878787; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; }
    .title { font-size: 30px; font-weight: 700; color: #333333; margin-bottom: 16px; line-height: 1.1; letter-spacing: -0.8px; }
    .description { font-size: 16px; color: #878787; margin-bottom: 32px; line-height: 1.5; }

    /* ÁREA DE TRABAJO (TEXTAREA) */
    .work-area { width: 100%; display: flex; flex-direction: column; }
    
    /* Usamos la tarjeta gris para enmarcar el espacio de escritura */
    .work-area.card { background-color: #f5f5f7; padding: 24px; border-radius: 16px; }

    textarea { 
        width: 100%; 
        background: transparent; 
        border: none; 
        resize: none; 
        font-family: inherit; 
        font-size: 16px; 
        color: #333333; /* Texto activo */
        line-height: 1.5; 
        outline: none; 
        min-height: 120px; 
    }

    textarea::placeholder { color: #878787; }

    /* BOTÓN DE MANDO */
    .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 30px; -webkit-appearance: none; }

    /* RESPONSIVE */
    @media (max-width: 480px) {
        .logo { margin-bottom: 20px; }
        .logo img { height: 45px; }
        .title { font-size: 26px; }
        .btn-mando { margin-top: 20px; }
        .work-area.card { padding: 20px; }
    }
</style>

<div class="container">
    <div class="logo">
        <img src="deepmersion.jpeg" alt="logo">
    </div>
    
    <p class="indicator">Misión 01 / Reporte</p>
    <h1 class="title">Bitácora de análisis.</h1>
    <p class="description">Reflexiona sobre el patrón detectado y descríbelo en tus propias palabras.</p>
    
    <div class="work-area card">
        <textarea placeholder="Comienza a escribir aquí..."></textarea>
    </div>
    
    <button class="btn-mando" onclick="window.location.href='siguiente.html'">
        Sincronizar reporte →
    </button>
</div>
