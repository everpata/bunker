<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texto / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: sans-serif; color: #333; background: #fff; position: absolute; z-index: 9999;">
        <h2 id="status-text" style="font-size: 18px; margin-bottom: 10px;">Verificando pase VIP...</h2>
        <p id="sub-text" style="font-size: 14px; color: #878787;">Conectando con la base de datos.</p>
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        <p class="indicator">Lección 01 / Inmersión</p>
        <div class="progress-container"><div class="progress-fill" style="width: 5%;"></div></div>
        
        <h1 class="title">El Anarquista.</h1>
        <p class="description">Bienvenido al Tramo 02. La máscara se ha roto.</p>
        
        <div class="work-area card">
            <p class="text-base">Aquí comienza la verdadera reconstrucción operativa.</p>
        </div>

        <button class="btn-mando" onclick="window.location.href='02_DM_bitacora.html'">Continuar →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "01_DM_texto.html";
        
        // EL NOMBRE EXACTO DEL ARCHIVO AL QUE LO VAMOS A PATEAR
        const archivoDeVenta = "08_DM_reportefinal.html"; 

        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // SI ES VIP
                        if (data.access_DM === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";
                            db.collection("usuarios").doc(user.uid).update({ leccion_actual_DM: archivoActual });
                        } 
                        // SI NO HA PAGADO
                        else {
                            document.getElementById("status-text").innerText = "Acceso denegado.";
                            document.getElementById("sub-text").innerText = `Redirigiendo a ${archivoDeVenta}...`;
                            
                            // Lo pateamos después de 1 segundo para que alcances a leer el mensaje
                            setTimeout(() => {
                                window.location.href = archivoDeVenta; 
                            }, 1500);
                        }
                    } else {
                        window.location.href = "index.html";
                    }
                }).catch(() => { window.location.href = "index.html"; });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
