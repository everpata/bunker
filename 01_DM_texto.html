<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texto / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS ESPECÍFICOS DE ESTA PÁGINA */

        /* Estilo único para el botón de Alerta (Hereda margin-top: 7px de style.css) */
        .btn-status-alert {
            display: none; /* Oculto por defecto, JS lo activa */
            background-color: #fce8e6 !important;
            color: #d93025 !important;
            border: 1px solid #d93025 !important;
            animation: btnElastic 4s ease-in-out infinite;
            text-align: center;
        }

        /* Animación de Respiración */
        @keyframes btnElastic {
            0% { padding-top: 18px; padding-bottom: 18px; }
            50% { padding-top: 24px; padding-bottom: 24px; }
            100% { padding-top: 18px; padding-bottom: 18px; }
        }

        /* Visibilidad controlada por JS */
        #btn-volver-hub { display: none; }

        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DM.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        <p class="indicator">Lección 01 / Inmersión</p>
        <div class="progress-container"><div class="progress-fill" style="width: 5%;"></div></div>
        
        <h1 class="title">El Anarquista.</h1>
        <p class="description">Bienvenido al Tramo 02. La máscara se ha roto.</p>
        
        <div class="work-area card">
            <p class="text-base">Aquí comienza la verdadera reconstrucción operativa. Has dejado atrás las proyecciones de la superficie para confrontar la estructura de lo que realmente eres bajo el ruido externo.</p>
        </div>

        <button id="btn-continuar" class="btn-mando">Continuar →</button>
        
        <button id="btn-alerta-reporte" class="btn-status-alert">REVISAR REPORTE DE DAÑOS →</button>
        
        <button id="btn-volver-hub" class="btn-ghost">← Volver al Hub</button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "01_DM_texto.html"; 
        const archivoSiguiente = "02_DM_bitacora.html"; 
        const archivoHub = "09_DM_hub.html"; 
        const archivoReporte = "08_DM_reportefinal.html";
        const archivoExpulsion = "index.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-alerta-reporte").onclick = () => { window.location.href = archivoReporte; };
        document.getElementById("btn-volver-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DM === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // Lógica de Repaso
                            if (data.estado === "Finalizado_DM" && !data.access_DQ) {
                                document.getElementById("btn-continuar").style.display = "none";
                                document.getElementById("btn-alerta-reporte").style.display = "block";
                                document.getElementById("btn-volver-hub").style.display = "block";
                            } 
                            else if (data.access_DQ === true) {
                                document.getElementById("btn-volver-hub").style.display = "block";
                            }

                            // Autoguardado GPS
                            if (data.estado !== "Finalizado_DM" && data.estado !== "Finalizado_DQ" && !data.access_DQ) {
                                userRef.update({ leccion_actual_DM: archivoActual }).catch(err => console.log(err));
                            }

                        } else {
                            window.location.href = archivoExpulsion; 
                        }
                    } else {
                        window.location.href = "index.html";
                    }
                }).catch(() => { window.location.href = "index.html"; });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
