<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texto / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo local para asegurar el centrado perfecto del logo de carga */
        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DM.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        <p class="indicator">Lección 01 / Inmersión</p>
        <div class="progress-container"><div class="progress-fill" style="width: 5%;"></div></div>
        
        <h1 class="title">El Anarquista.</h1>
        <p class="description">Bienvenido al Tramo 02. La máscara se ha roto.</p>
        
        <div class="work-area card">
            <p class="text-base">Aquí comienza la verdadera reconstrucción operativa.</p>
        </div>

        <button id="btn-continuar" class="btn-mando">Continuar →</button>
        
        <button id="btn-hub" class="btn-mando" style="display: none; background: transparent; color: #878787; border: 1px solid #eaeaea; margin-top: 15px;">Regresar al Hub</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "01_DM_texto.html";         // GPS: Archivo actual
        const archivoSiguiente = "02_DM_bitacora.html";   // Destino al dar clic en Continuar
        const archivoHub = "09_DM_hub.html";              // Destino del Hub
        const archivoExpulsion = "08_DF_reportefinal.html"; // Destino si rechaza el pase VIP

        // 🔴 ACTUALIZAR: Credenciales de Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. ASIGNACIÓN DE BOTONES
        document.getElementById("btn-continuar").addEventListener("click", () => {
            window.location.href = archivoSiguiente;
        });
        document.getElementById("btn-hub").addEventListener("click", () => {
            window.location.href = archivoHub;
        });

        // 2. MOTOR DE SEGURIDAD VIP
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // VALIDACIÓN VIP: ¿Tiene el pase comprado de la DM?
                        if (data.access_DM === true) {
                            
                            // Autorizado: Quitar escudo de carga (Solo el logo parpadeante desaparece)
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // Revelar Botón Fantasma si ya terminó este tramo o superiores
                            if (data.estado === "Finalizado_DM" || data.estado === "Finalizado_DQ" || data.access_DQ === true) {
                                document.getElementById("btn-hub").style.display = "block";
                            }

                            // Autoguardado GPS (Solo si es su primera vez)
                            if (data.estado !== "Finalizado_DM" && data.estado !== "Finalizado_DQ" && !data.access_DQ) {
                                userRef.update({ leccion_actual_DM: archivoActual }).catch(err => console.log(err));
                            }

                        } else {
                            // Intruso detectado: Expulsión inmediata y silenciosa
                            // No ponemos textos de "error", simplemente lo sacamos.
                            window.location.href = archivoExpulsion; 
                        }
                    } else {
                        window.location.href = "index.html";
                    }
                }).catch(() => { window.location.href = "index.html"; });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
