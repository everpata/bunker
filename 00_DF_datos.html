<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; display: flex; flex-direction: column; align-items: flex-start; }
        .logo { margin: 0 0 30px -15px; }
        .logo img { height: 60px; width: auto; display: block; }
        .indicator { font-size: 11px; font-weight: 600; color: #878787; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { font-size: 30px; font-weight: 700; color: #333333; margin-bottom: 16px; line-height: 1.1; }
        .description { font-size: 16px; color: #878787; margin-bottom: 32px; line-height: 1.5; }
        .form-area { width: 100%; display: flex; flex-direction: column; }
        input { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 12px 0; font-size: 16px; color: #333333; outline: none; background: transparent; font-family: inherit; }
        .iti { width: 100%; margin-top: 10px; } 
        .iti__input { border: none !important; border-bottom: 1px solid #eaeaea !important; border-radius: 0 !important; font-size: 16px !important; width: 100% !important; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="DF.png" alt="logo"></div>
        <p class="indicator">Paso 01 / Perfil</p>
        <h1 class="title">Datos de contacto.</h1>
        <p class="description">Establece tus coordenadas de enlace.</p>
        <div class="form-area">
            <input type="number" id="userAge" placeholder="Edad">
            <input type="text" id="userJob" placeholder="Ocupación">
            <input id="phone" type="tel">
        </div>
        <button id="btnGuardar" class="btn-mando">Continuar &#8594;</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // PUNTO DE ENTRADA AL EMBUDO
        // =======================================================
        const primeraLeccion = "01_DF_texto.html"; // Asegúrate de que este nombre coincida con tu primera lección real

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Inicializar Teléfono con detección de país
        const phoneInputField = document.querySelector("#phone");
        const phoneInput = window.intlTelInput(phoneInputField, {
            preferredCountries: ["mx", "es", "co", "ar"],
            separateDialCode: true,
            initialCountry: "auto",
            geoIpLookup: function(success) {
                fetch("https://ipapi.co/json")
                    .then(res => res.json())
                    .then(data => success(data.country_code))
                    .catch(() => success("mx"));
            }
        });

        // Centinela y Enrutador Inicial
        auth.onAuthStateChanged((user) => { 
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                // Si el usuario recarga la página pero ya tiene una lección guardada, lo manda a la lección
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists && doc.data().fase === "Operativo") {
                        window.location.href = doc.data().leccion_actual || primeraLeccion;
                    }
                });
            }
        });

        // Lógica de Guardado
        document.getElementById('btnGuardar').addEventListener('click', () => {
            const user = auth.currentUser;
            const age = document.getElementById('userAge').value;
            const job = document.getElementById('userJob').value;
            const btn = document.getElementById('btnGuardar');
            
            // CAPTURA INTELIGENTE DEL TELÉFONO
            let fullPhone = phoneInput.getNumber(); 
            
            if (!fullPhone || !fullPhone.includes('+')) {
                const dialCode = phoneInput.getSelectedCountryData().dialCode; 
                const localNumber = phoneInputField.value.replace(/\s+/g, ''); 
                fullPhone = `+${dialCode}${localNumber}`;
            }

            if (!age || !job || phoneInputField.value === "") { 
                alert("Por favor, completa todos los datos operativos."); 
                return; 
            }

            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            // Actualizar en Firestore e inyectar en el túnel
            db.collection("usuarios").doc(user.uid).update({
                edad: age,
                ocupacion: job,
                telefono: fullPhone,
                fase: "Operativo", // Cambiamos de Registrado a Operativo
                leccion_actual: primeraLeccion, // Le decimos al router dónde debe ir a partir de ahora
                ultimaSincronizacion: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => { 
                window.location.href = primeraLeccion; 
            })
            .catch((error) => { 
                alert("Error de sincronización: " + error.message); 
                btn.innerText = "Continuar →";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
