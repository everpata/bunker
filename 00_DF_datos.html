<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepfall / Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <link rel="stylesheet" href="style.css"> 
    <style>
        .iti { width: 100%; margin-top: 10px; } 
        .iti__input { 
            border: none !important; 
            border-bottom: 1px solid #eaeaea !important; 
            border-radius: 0 !important; 
            font-size: 16px !important; 
            width: 100% !important; 
            padding: 12px 0 12px 50px !important; 
            background: transparent !important; 
        }
        .form-area input { 
            width: 100%; 
            border: none; 
            border-bottom: 1px solid #eaeaea; 
            padding: 12px 0; 
            font-size: 16px; 
            color: #333333; 
            outline: none; 
            background: transparent; 
            font-family: inherit; 
            margin-bottom: 10px; 
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* ESTILO REGISTRO SELLADO */
        .btn-disabled {
            background-color: #f5f5f7 !important;
            color: #878787 !important;
            border: 1px solid #e0e0e0 !important;
            cursor: default !important;
            pointer-events: none !important;
        }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png" alt="logo"></div>
        <p class="indicator">Tramo 01 / Perfil</p>
        <h1 class="title">Datos de contacto.</h1>
        <p class="description">Establece tus coordenadas de enlace.</p>
        
        <div class="form-area" id="form-perfil">
            <input type="number" id="userAge" placeholder="Edad">
            <input type="text" id="userJob" placeholder="Ocupación">
            <input id="phone" type="tel">
        </div>
        
        <button id="btnGuardar" class="btn-mando" style="margin-top: 35px;">Continuar →</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // 🚩 COORDENADAS DE ENTRADA
        const archivoActual = "00_DF_datos.html";
        const leccion1DF = "01_DF_video.html";
        const leccion1DM = "01_DM_texto.html";
        const leccion1DQ = "01_DQ_texto.html";
        const reporteDF = "08_DF_reportefinal.html";
        const reporteDM = "08_DM_reportefinal.html";

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const phoneInputField = document.querySelector("#phone");
        const phoneInput = window.intlTelInput(phoneInputField, {
            preferredCountries: ["mx", "es", "co", "ar"],
            separateDialCode: true,
            initialCountry: "auto",
            geoIpLookup: function(success) {
                fetch("https://ipapi.co/json").then(res => res.json()).then(data => success(data.country_code)).catch(() => success("mx"));
            }
        });

        // 🧠 CENTINELA INTELIGENTE V5.0 (GPS + INTEGRIDAD)
        auth.onAuthStateChanged((user) => { 
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    const data = doc.data() || {};
                    
                    // 1. ESCUDO DE INTEGRIDAD: Si ya es Operativo, lo lanzamos fuera.
                    if (doc.exists && data.estado === "Operativo") {
                        const btn = document.getElementById("btnGuardar");
                        btn.innerText = "COORDINADAS SELLADAS ✓";
                        btn.classList.add("btn-disabled");
                        lanzarAUbicacion(data);
                    } else {
                        // Si no ha llenado datos, permitimos ver el búnker
                        document.getElementById("loading-screen").style.display = "none";
                        document.getElementById("bunker-content").style.display = "flex";

                        // 2. GPS MATEMÁTICO: Solo actualizamos si no hay progreso guardado
                        // Sacamos el número de la lección guardada (ej: "05_DF" -> 5)
                        const numGuardado = data.leccion_actual_DF ? parseInt(data.leccion_actual_DF.split('_')[0]) : -1;
                        const numActual = parseInt(archivoActual.split('_')[0]); // 0

                        if (numActual > numGuardado) {
                            userRef.update({ leccion_actual_DF: archivoActual });
                        }
                    }
                });
            }
        });

        // 🚀 MOTOR DE LANZAMIENTO ESTRATÉGICO (Mantiene la lógica de graduados)
        function lanzarAUbicacion(data) {
            if (data.access_DQ) {
                window.location.href = data.leccion_actual_DQ || leccion1DQ;
            } 
            else if (data.access_DM) {
                if (data.estado === "Finalizado_DM") {
                    window.location.href = reporteDM;
                } else {
                    window.location.href = data.leccion_actual_DM || leccion1DM;
                }
            } 
            else {
                if (data.estado === "Finalizado_DF") {
                    window.location.href = reporteDF;
                } else {
                    // Si nunca ha avanzado, lo mandamos a la 01
                    window.location.href = data.leccion_actual_DF && data.leccion_actual_DF !== archivoActual ? data.leccion_actual_DF : leccion1DF;
                }
            }
        }

        // Lógica de Guardado (Solo se activa si el centinela no redirigió)
        document.getElementById('btnGuardar').addEventListener('click', () => {
            const user = auth.currentUser;
            const age = document.getElementById('userAge').value;
            const job = document.getElementById('userJob').value;
            const btn = document.getElementById('btnGuardar');
            
            let fullPhone = phoneInput.getNumber(); 
            if (!fullPhone || !fullPhone.includes('+')) {
                const dialCode = phoneInput.getSelectedCountryData().dialCode; 
                const localNumber = phoneInputField.value.replace(/\s+/g, ''); 
                fullPhone = `+${dialCode}${localNumber}`;
            }

            if (!age || !job || phoneInputField.value === "") { 
                alert("Por favor, completa todos los datos operativos."); 
                return; 
            }

            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            const userRef = db.collection("usuarios").doc(user.uid);

            // Sello de Integridad al Guardar
            userRef.set({
                edad: age,
                ocupacion: job,
                telefono: fullPhone,
                estado: "Operativo",
                leccion_actual_DF: leccion1DF, // Al guardar por primera vez, el GPS apunta a la 01
                ultimaSincronizacion: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
            .then(() => { 
                userRef.get().then((doc) => {
                    lanzarAUbicacion(doc.data());
                });
            })
            .catch((error) => { 
                alert("Error: " + error.message); 
                btn.innerText = "Continuar →";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
