<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepfall / Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <link rel="stylesheet" href="style.css"> 
    <style>
        .iti { width: 100%; margin-top: 10px; } 
        .iti__input { 
            border: none !important; 
            border-bottom: 1px solid #eaeaea !important; 
            border-radius: 0 !important; 
            font-size: 16px !important; 
            width: 100% !important; 
            padding: 12px 0 12px 50px !important; 
            background: transparent !important; 
        }
        .form-area input { 
            width: 100%; 
            border: none; 
            border-bottom: 1px solid #eaeaea; 
            padding: 12px 0; 
            font-size: 16px; 
            color: #333333; 
            outline: none; 
            background: transparent; 
            font-family: inherit; 
            margin-bottom: 10px; 
        }
        /* Ajuste para que el input de edad no tenga flechas */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="loading-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #fff; position: fixed; z-index: 9999;">
        <img src="DF.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png" alt="logo"></div>
        <p class="indicator">Paso 01 / Perfil</p>
        <h1 class="title">Datos de contacto.</h1>
        <p class="description">Establece tus coordenadas de enlace.</p>
        
        <div class="form-area">
            <input type="number" id="userAge" placeholder="Edad">
            <input type="text" id="userJob" placeholder="Ocupación">
            <input id="phone" type="tel">
        </div>
        
        <button id="btnGuardar" class="btn-mando" style="margin-top: 35px;">Continuar →</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const primeraLeccion = "01_DF_texto.html"; 

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Inicializar Teléfono
        const phoneInputField = document.querySelector("#phone");
        const phoneInput = window.intlTelInput(phoneInputField, {
            preferredCountries: ["mx", "es", "co", "ar"],
            separateDialCode: true,
            initialCountry: "auto",
            geoIpLookup: function(success) {
                fetch("https://ipapi.co/json")
                    .then(res => res.json())
                    .then(data => success(data.country_code))
                    .catch(() => success("mx"));
            }
        });

        // 🧠 CENTINELA INTELIGENTE V4.1
        auth.onAuthStateChanged((user) => { 
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists && doc.data().estado === "Operativo") {
                        const data = doc.data();
                        // Enrutamiento por prioridad de tramo
                        if (data.leccion_actual_DQ) { window.location.href = data.leccion_actual_DQ; }
                        else if (data.leccion_actual_DM) { window.location.href = data.leccion_actual_DM; }
                        else { window.location.href = data.leccion_actual_DF || primeraLeccion; }
                    } else {
                        // Usuario nuevo o incompleto: Quitar loading
                        document.getElementById("loading-screen").style.display = "none";
                        document.getElementById("bunker-content").style.display = "flex";
                    }
                });
            }
        });

        // Lógica de Guardado Blindada
        document.getElementById('btnGuardar').addEventListener('click', () => {
            const user = auth.currentUser;
            const age = document.getElementById('userAge').value;
            const job = document.getElementById('userJob').value;
            const btn = document.getElementById('btnGuardar');
            
            let fullPhone = phoneInput.getNumber(); 
            if (!fullPhone || !fullPhone.includes('+')) {
                const dialCode = phoneInput.getSelectedCountryData().dialCode; 
                const localNumber = phoneInputField.value.replace(/\s+/g, ''); 
                fullPhone = `+${dialCode}${localNumber}`;
            }

            if (!age || !job || phoneInputField.value === "") { 
                alert("Por favor, completa todos los datos operativos."); 
                return; 
            }

            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            // 🛡️ EL CERROJO: .set(..., { merge: true }) 
            // Crea el documento si no existe, evita el error de sincronización
            db.collection("usuarios").doc(user.uid).set({
                edad: age,
                ocupacion: job,
                telefono: fullPhone,
                estado: "Operativo",
                access_DF: true, // Acceso inicial concedido
                leccion_actual_DF: primeraLeccion, 
                ultimaSincronizacion: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
            .then(() => { 
                window.location.href = primeraLeccion; 
            })
            .catch((error) => { 
                alert("Error de sincronización: " + error.message); 
                btn.innerText = "Continuar →";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
