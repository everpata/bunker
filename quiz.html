<!DOCTYPE html>
<html lang="es">
<head>

    <title>Deepmersion / Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <p class="description">¿Cuál es el principal saboteador de tu claridad operativa en este momento?</p>

        <div class="work-area">
            <button class="option-btn" onclick="this.classList.toggle('selected')">

            <button class="option-btn" onclick="this.classList.toggle('selected')">

            </button>
        </div>

        <button class="btn-mando" onclick="window.location.href='siguiente_leccion.html'">
            Sincronizar respuesta →
        </button>
    </div>
