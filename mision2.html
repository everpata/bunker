<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Misión 02</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .content-block { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; }
        .logo-container { margin-bottom: 30px; align-self: flex-start; margin-left: -10px; }
        .logo-container img { height: 60px; width: auto; }
        .indicator { color: #878787; font-size: 11px; font-weight: 600; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 30px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; }
        .description { color: #878787; font-size: 16px; line-height: 1.5; margin: 0 0 32px 0; }
        textarea { width: 100%; border: none; border-bottom: 1px solid #eaeaea; padding: 10px 0; color: #333333; outline: none; background: transparent; resize: none; font-size: 16px; font-family: inherit; }
        textarea::placeholder { color: #878787; opacity: 1; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; margin-top: 30px; }
        @media (max-width: 480px) { .logo-container { margin-bottom: 20px; } .logo-container img { height: 45px; } .title { font-size: 26px; } .btn-mando { margin-top: 20px; } }
    </style>
</head>
<body>
    <div class="content-block">
        <div class="logo-container"><img src="deepmersion.jpeg" alt="logo"></div>
        <p class="indicator">Misión 01 / Verdad</p>
        <h1 class="title">La máscara.</h1>
        <p class="description">Identifica el patrón operativo que detectaste.</p>
        <textarea rows="1" placeholder="Escribe tu reporte..."></textarea>
        <button onclick="window.location.href='mision3.html'" class="btn-mando">Sincronizar reporte &#8594;</button>
    </div>
</body>
</html>
