<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video / Deepfall (T01)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS ESPECÍFICOS */
        
        /* Botón Rojo Elástico (Upsell al Tramo 02) */
        .btn-status-alert {
            display: none; 
            background-color: #fce8e6 !important;
            color: #d93025 !important;
            border: 1px solid #d93025 !important;
            font-weight: 700 !important;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(217, 48, 37, 0.1);
            animation: btnElastic 4s ease-in-out infinite;
            text-align: center;
            margin-top: 35px !important;
        }

        @keyframes btnElastic {
            0% { padding-top: 18px; padding-bottom: 18px; }
            50% { padding-top: 24px; padding-bottom: 24px; }
            100% { padding-top: 18px; padding-bottom: 18px; }
        }

        /* Ocultar botones para que el JS decida */
        #btn-continuar, #btn-alerta-reporte, #btn-volver-hub { display: none; }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator">Tramo 01 / Vida sin lastre</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 75%;"></div>
        </div>
        
        <h1 class="title">Esto fué lo que me sucedió.</h1>
        <p class="description">Me besé con esta chica sin siquiera saber cómo se llamaba, fruto de experimetarme sin restricciones y haberme librado del lastre.</p>
        
        <div class="work-area">
            <div class="video-container">
                <iframe src="https://player.mediadelivery.net/embed/649829/47a425dc-51ed-4765-aa73-324ac45e717b?autoplay=false&loop=false&muted=false&preload=false&responsive=true" 
            loading="lazy" 
            style="border:0; position:absolute; top:0; left:0; height:100%; width:100%;" 
            allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen></iframe>
            </div>
        </div>

        <button id="btn-continuar" class="btn-mando">He visto el video →</button>
        <button id="btn-alerta-reporte" class="btn-status-alert">AVANZAR AL TRAMO 02 →</button>
        <button id="btn-volver-hub" class="btn-ghost">← Volver al Hub</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "13_DF_video.html"; 
        const archivoSiguiente = "14_DF_video.html"; 
        const archivoHub = "09_DF_hub.html"; 
        const archivoReporte = "08_DF_reportefinal.html";
        const archivoExpulsion = "index.html"; 

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-alerta-reporte").onclick = () => { window.location.href = archivoReporte; };
        document.getElementById("btn-volver-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        document.getElementById("loading-screen").style.display = "none";
                        document.getElementById("bunker-content").style.display = "flex";

                        const btnNegro = document.getElementById("btn-continuar");
                        const btnRojo = document.getElementById("btn-alerta-reporte");
                        const btnHub = document.getElementById("btn-volver-hub");

                        // 🧠 CEREBRO DE NAVEGACIÓN (Lógica DF)
                        
                        if (data.estado === "Finalizado_DF" && !data.access_DM) {
                            // MODO REPASO LIMITADO (Terminó DF pero no pagó DM)
                            btnNegro.style.display = "none";
                            btnRojo.style.display = "block";
                            btnHub.style.display = "none"; 
                        } 
                        else if (data.access_DM === true || data.estado === "Finalizado_DM" || data.access_DQ === true) {
                            // MODO VETERANO (Ya tiene acceso a la DM o superior)
                            btnNegro.style.display = "block";
                            btnRojo.style.display = "none";
                            btnHub.style.display = "block";
                        }
                        else {
                            // MODO EXPLORADOR (Primera vez)
                            btnNegro.style.display = "block";
                            btnRojo.style.display = "none";
                            btnHub.style.display = "none";
                        }

                        // GPS DF
                        if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            userRef.update({ leccion_actual_DF: archivoActual }).catch(err => console.log(err));
                        }

                    } else { window.location.href = archivoExpulsion; }
                });
            } else { window.location.href = archivoExpulsion; }
        });
    </script>
</body>
</html>
