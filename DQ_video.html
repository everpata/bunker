<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 AJUSTES ESPECÍFICOS DQ V4.9 */
        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* 🔒 BLOQUEO RADICAL DE FUGA: Ocultos por defecto */
        #btn-continuar { display: none; margin-top: 35px !important; }
        
        #btn-hub { 
            display: none !important; 
            margin-top: 20px !important; 
        }

        /* Sincronización de silueta V4.0 para el video */
        .video-container {
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Módulo 01 / Cúspide</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 60%;"></div>
        </div>
        
        <h1 class="title">Análisis Visual.</h1>
        <p class="description">Identifica las mecánicas de dominio absoluto.</p>
        
        <div class="work-area">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>

        <button id="btn-continuar" class="btn-mando">He visto el video →</button>
        <button id="btn-hub" class="btn-ghost">← Volver al Hub de la Cúspide</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "05_DQ_video.html"; 
        const archivoSiguiente = "06_DQ_principios.html"; 
        const archivoHub = "09_DQ_hub.html"; 
        const archivoExpulsion = "08_DM_reportefinal.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            const btnNext = document.getElementById("btn-continuar");
                            const btnHub = document.getElementById("btn-hub");

                            // 🧠 CEREBRO DE NAVEGACIÓN V4.9
                            btnNext.style.display = "block";

                            // 🔒 EL CANDADO DEL HUB (Solo para Graduados)
                            if (data.estado === "Finalizado_DQ") {
                                btnHub.style.setProperty('display', 'block', 'important');
                            } else {
                                btnHub.style.setProperty('display', 'none', 'important');
                            }

                            // GPS DQ (Tracking de progreso)
                            if (data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DQ: archivoActual });
                            }

                        } else {
                            window.location.href = archivoExpulsion; 
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
