<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éxito / Deepfall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 AJUSTE DE POSICIONAMIENTO V6.4 */
        html, body { 
            height: auto; 
            min-height: 100%; 
            margin: 0; 
            background-color: #ffffff; 
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Safe area para el logo en móviles */
            padding: 0px 0 0 0 !important; 
        }

        .victory-img { 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            animation: floatIn 1.5s ease forwards; 
            display: block;
        }

        .victory-card { 
            opacity: 0; 
            animation: floatIn 1s ease forwards 1s; 
            width: 100%;
            /* REGLA DE ORO: Texto a la izquierda */
            text-align: left !important; 
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* NAVEGACIÓN LINEAL */
        #btn-continuar { display: none; margin-top: 35px !important; }
        
        #btn-hub { 
            display: none !important; 
            margin-top: 20px !important; 
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        <p class="indicator">Tramo 01 Completado</p>
        
        <h1 class="title">Descenso Finalizado.</h1>

        <img src="victoria.jpeg" class="victory-img" alt="Éxito Operativo">

        <div class="work-area card victory-card">
            <p class="text-base">Has fracturado la máscara de la superficie. Tu capacidad para mentirte ha sido neutralizada. <b>Prepárate para el diagnóstico final.</b></p>
        </div>

        <button id="btn-continuar" class="btn-mando">Abrir Reporte de Descenso →</button>
        <button id="btn-hub" class="btn-ghost">← Volver al Hub del Descenso</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoSiguiente = "08_DF_reportefinal.html"; 
        const archivoHub = "09_DF_hub.html";

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const btnHub = document.getElementById("btn-hub");
                        
                        // 1. Sellar estado
                        if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            userRef.update({ 
                                estado: "Finalizado_DF", 
                                leccion_actual_DF: "07_DF_exito.html" 
                            });
                        }

                        // 2. Mostrar Hub solo si ya terminó el tramo o es veterano
                        if (data.estado === "Finalizado_DF" || data.access_DM || data.access_DQ) {
                            btnHub.style.setProperty('display', 'block', 'important');
                        }

                        document.getElementById("loading-screen").style.display = "none";
                        document.getElementById("bunker-content").style.display = "flex";
                        document.getElementById("btn-continuar").style.display = "block";
                        
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
