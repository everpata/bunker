<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Sincronizando / Deepfall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 ESTÉTICA DE RELIQUIA BLOQUEADA V7.0 */
        html, body { 
            height: auto; 
            min-height: 100%; 
            margin: 0; 
            background-color: #ffffff; 
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Safe area superior (sin logo, pero necesitamos aire) */
            padding: 80px 0 0 0 !important; 
        }

        /* Imagen del Candado Arqueológico */
        .relic-lock-img {
            width: 160px; /* Ajustar según diseño de la imagen */
            height: auto;
            margin-bottom: 30px;
            display: block;
            opacity: 0.9;
            /* Pequeña animación de respiración para que se sienta "activa" */
            animation: relicPulse 3s ease-in-out infinite;
        }

        @keyframes relicPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        /* Texto breve antes del timer - JUSTIFICADO A LA IZQUIERDA */
        .instruction-text {
            width: 100%;
            text-align: left !important;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px; /* Pegado al timer */
            padding: 0 5px; /* Pequeño ajuste para alinear con las cajas */
        }

        /* TEMPORIZADOR HORIZONTAL (Estilo Reporte) */
        .stats-container {
            display: flex !important; flex-direction: row !important;
            gap: 10px; width: 100%; 
            margin-bottom: 35px; /* Separación del botón */
        }

        .stat-box {
            flex: 1; background-color: #f5f5f7; padding: 22px 5px;
            border-radius: 16px; text-align: center;
            border: 1px solid #e0e0e0;
        }

        .stat-value { font-size: 24px; font-weight: 800; color: #333; line-height: 1; }
        .stat-label { font-size: 9px; font-weight: 700; color: #878787; margin-top: 8px; display: block; text-transform: uppercase; }

        /* Animación para el botón negro cuando el tiempo acaba */
        @keyframes pulseReady {
            0%, 100% { background-color: #333; }
            50% { background-color: #000; transform: scale(1.02); }
        }
        .btn-ready { animation: pulseReady 2s infinite !important; }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        
        <img src="candado.webp" class="relic-lock-img" alt="Protocolo Bloqueado">
        
        <p class="indicator">Sincronización de Protocolo</p>
        
        <p class="instruction-text">La superficie opone resistencia operativa. La siguiente ruta será liberada en:</p>

        <div id="countdown" class="stats-container">
            <div class="stat-box"><span class="stat-value" id="hrs">00</span><span class="stat-label">Horas</span></div>
            <div class="stat-box"><span class="stat-value" id="min">00</span><span class="stat-label">Minutos</span></div>
            <div class="stat-box"><span class="stat-value" id="seg">00</span><span class="stat-label">Segundos</span></div>
        </div>

        <button class="btn-mando" id="btn-actualizar" onclick="window.location.reload(true);">Actualizar Protocolo →</button>
        <button id="btn-volver-hub" class="btn-ghost" style="margin-top: 20px;">← Volver al Hub</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // 🚨 CONFIGURACIÓN DE TU ARCHIVO ACTUAL
        const archivoActual = "04_DF_imagen.html"; // <-- NOMBRE REAL DEL ARCHIVO
        const archivoHub = "09_DF_hub.html";

        // 🕒 CONFIGURACIÓN DEL TEMPORIZADOR
        // Formato: "Mes Día, Año Hora:Minutos:Segundos"
        const countDownDate = new Date("Apr 30, 2026 10:00:00").getTime(); 

        document.getElementById("btn-volver-hub").onclick = () => { window.location.href = archivoHub; };

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                // ACTUALIZA EL GPS
                userRef.update({ leccion_actual_DF: archivoActual });

                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("bunker-content").style.display = "flex";

                // MOTOR DEL TEMPORIZADOR
                const x = setInterval(function() {
                    const now = new Date().getTime();
                    const distance = countDownDate - now;

                    if (distance < 0) {
                        clearInterval(x);
                        // Cuando el tiempo acaba
                        document.getElementById("countdown").style.display = "none";
                        document.querySelector(".instruction-text").innerHTML = "<b>La resistencia ha sido neutralizada.</b><br><br>Actualiza el protocolo para acceder a las coordenadas.";
                        document.getElementById("btn-actualizar").classList.add("btn-ready");
                    } else {
                        // Cálculo de tiempo
                        const hours = Math.floor(distance / (1000 * 60 * 60));
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                        document.getElementById("hrs").innerText = hours.toString().padStart(2, '0');
                        document.getElementById("min").innerText = minutes.toString().padStart(2, '0');
                        document.getElementById("seg").innerText = seconds.toString().padStart(2, '0');
                    }
                }, 1000);

            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
