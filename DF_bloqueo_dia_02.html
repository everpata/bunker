<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Sincronizando / Deepfall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 AJUSTES ESTRUCTURALES Y TEMPORIZADOR */
        html, body { 
            height: auto; 
            min-height: 100%; 
            margin: 0; 
            background-color: #ffffff; 
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 0 0 0 !important; 
        }

        .work-area.card {
            text-align: left !important;
            width: 100%;
        }

        /* Eliminamos el margen sobrante del párrafo dentro de la tarjeta */
        #status-text { margin-bottom: 0; }

        /* TEMPORIZADOR HORIZONTAL INDEPENDIENTE */
        .stats-container {
            display: flex !important; flex-direction: row !important;
            gap: 10px; width: 100%; 
            margin-top: 20px; /* Separación de la tarjeta superior */
            margin-bottom: 30px; /* Separación del botón inferior */
        }

        .stat-box {
            flex: 1; background-color: #f5f5f7; padding: 22px 5px;
            border-radius: 16px; text-align: center;
            border: 1px solid #e0e0e0;
        }

        .stat-value { font-size: 24px; font-weight: 800; color: #333; line-height: 1; }
        .stat-label { font-size: 9px; font-weight: 700; color: #878787; margin-top: 8px; display: block; text-transform: uppercase; }

        /* ANIMACIÓN DE BOTÓN AL FINALIZAR */
        @keyframes pulseAlert {
            0%, 100% { transform: scale(1); background-color: #333; }
            50% { transform: scale(1.02); background-color: #000; }
        }
        .btn-ready { animation: pulseAlert 2s infinite !important; }

        #btn-volver-hub { margin-top: 20px !important; }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        <p class="indicator">Sector Bloqueado</p>
        <h1 class="title">Sincronizando.</h1>

        <div class="work-area card">
            <p class="text-base" id="status-text">La superficie aún opone resistencia. Las coordenadas del siguiente sector están siendo procesadas para su liberación.</p>
        </div>

        <div id="countdown" class="stats-container">
            <div class="stat-box"><span class="stat-value" id="hrs">00</span><span class="stat-label">Horas</span></div>
            <div class="stat-box"><span class="stat-value" id="min">00</span><span class="stat-label">Minutos</span></div>
            <div class="stat-box"><span class="stat-value" id="seg">00</span><span class="stat-label">Segundos</span></div>
        </div>

        <button class="btn-mando" id="btn-actualizar" onclick="window.location.reload(true);">Actualizar Protocolo →</button>
        <button id="btn-volver-hub" class="btn-ghost">← Volver al Hub</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // 🚨 CONFIGURACIÓN DE TU ARCHIVO ACTUAL
        const archivoActual = "04_DF_imagen.html"; // <-- PON EL NOMBRE REAL DEL ARCHIVO AQUÍ
        const archivoHub = "09_DF_hub.html";

        // 🕒 CONFIGURACIÓN DEL TEMPORIZADOR
        // Formato: "Mes Día, Año Hora:Minutos:Segundos"
        const countDownDate = new Date("Apr 30, 2026 10:00:00").getTime(); 

        document.getElementById("btn-volver-hub").onclick = () => { window.location.href = archivoHub; };

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                // ACTUALIZA EL GPS
                userRef.update({ leccion_actual_DF: archivoActual });

                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("bunker-content").style.display = "block";

                // MOTOR DEL TEMPORIZADOR
                const x = setInterval(function() {
                    const now = new Date().getTime();
                    const distance = countDownDate - now;

                    if (distance < 0) {
                        clearInterval(x);
                        // Oculta el reloj y actualiza la tarjeta
                        document.getElementById("countdown").style.display = "none";
                        document.getElementById("status-text").innerHTML = "<b>Las coordenadas han sido liberadas.</b><br><br>Actualiza el protocolo para entrar al sector.";
                        document.getElementById("btn-actualizar").classList.add("btn-ready");
                    } else {
                        // Cálculo de tiempo
                        const hours = Math.floor(distance / (1000 * 60 * 60));
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                        document.getElementById("hrs").innerText = hours.toString().padStart(2, '0');
                        document.getElementById("min").innerText = minutes.toString().padStart(2, '0');
                        document.getElementById("seg").innerText = seconds.toString().padStart(2, '0');
                    }
                }, 1000);

            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
