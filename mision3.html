<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Misión 03</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; display: flex; flex-direction: column; align-items: flex-start; }
        .logo { margin: 0 0 30px -10px; }
        .logo img { height: 60px; width: auto; display: block; }
        .indicator { font-size: 11px; font-weight: 600; color: #878787; margin-bottom: 8px; letter-spacing: 1.5px; text-transform: uppercase; }
        .progress-container { width: 100%; height: 2px; background-color: #f5f5f7; margin-bottom: 24px; border-radius: 2px; }
        .progress-fill { height: 100%; background-color: #333333; width: 50%; transition: width 0.8s ease; }
        .title { font-size: 30px; font-weight: 700; color: #333333; margin-bottom: 16px; line-height: 1.1; }
        .description { font-size: 16px; color: #878787; margin-bottom: 32px; line-height: 1.5; }
        .video-box { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 35px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg" alt="logo"></div>
        <p class="indicator">Misión 02 / Teoría</p>
        <div class="progress-container"><div class="progress-fill"></div></div>
        <h1 class="title">La Profundidad.</h1>
        <p class="description">Entiende la estructura del búnker antes de avanzar.</p>
        <div class="video-box"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe></div>
        <button id="btnSiguiente" class="btn-mando">He visto el video &#8594;</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => { if (!user) window.location.href = "index.html"; });

        document.getElementById('btnSiguiente').addEventListener('click', () => {
            db.collection("usuarios").doc(auth.currentUser.uid).update({
                progreso: 50,
                fase: "Video Visto"
            }).then(() => { window.location.href = "mision4.html"; });
        });
    </script>
</body>
</html>
