<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Misión 03</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .logo-container { position: absolute; top: 45px; left: 45px; z-index: 10; }
        .logo-container img { height: 60px; width: auto; display: block; }
        .content-block { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 45px; box-sizing: border-box; display: flex; flex-direction: column; }
        .indicator { color: #878787; font-size: 11px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 30px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; letter-spacing: -0.8px; }
        .description { color: #878787; font-size: 16px; line-height: 1.5; margin: 0 0 32px 0; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
        /* Opciones Sofisticadas en color secundario #878787 */
        .option-btn { background: #f5f5f7; border: 1px solid transparent; padding: 18px 22px; border-radius: 16px; color: #878787; font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; -webkit-appearance: none; }
        /* Efecto al tocar: se oscurece a #333333 */
        .option-btn:active { background: #e8e8ed; color: #333333; border-color: #d2d2d7; transform: scale(0.98); }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; -webkit-appearance: none; }
        @media (max-width: 480px) { .logo-container { top: 35px; left: 45px; } .logo-container img { height: 45px; } .title { font-size: 26px; } .description { font-size: 15px; } .option-btn { padding: 15px 20px; font-size: 15px; } }
        @media (max-height: 700px) { .title { font-size: 22px; } .options-grid { gap: 8px; margin-bottom: 20px; } }
    </style>
</head>
<body>
    <div class="logo-container"><img src="deepmersion.jpeg" alt="deepmersion logo"></div>
    <div class="content-block">
        <p class="indicator">Misión 01 / Fase de verdad</p>
        <h1 class="title">La resistencia.</h1>
        <p class="description">Identifica el muro que bloquea tu avance. ¿Cuál es tu mayor resistencia hoy?</p>
        <div class="options-grid">
            <button class="option-btn">Miedo al juicio.</button>
            <button class="option-btn">Comodidad acumulada.</button>
            <button class="option-btn">Falta de claridad.</button>
            <button class="option-btn">Ego / Orgullo.</button>
        </div>
        <button onclick="window.location.href='mision4.html'" class="btn-mando">Sincronizar reporte &#8594;</button>
    </div>
</body>
</html>
