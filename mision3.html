<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deepmersion / Misión 03</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .content-block { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 460px; padding: 0 40px; box-sizing: border-box; display: flex; flex-direction: column; }
        .indicator { color: #878787; font-size: 12px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1.5px; text-transform: uppercase; }
        .title { color: #333333; font-size: 32px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; letter-spacing: -0.8px; }
        .description { color: #878787; font-size: 17px; line-height: 1.5; margin: 0 0 32px 0; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
        .option-btn { background: #ffffff; border: 1px solid #eaeaea; padding: 16px 20px; border-radius: 12px; color: #878787; font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; -webkit-appearance: none; }
        .option-btn:active { background: #f2f2f7; border-color: #333333; color: #333333; }
        .btn-mando { width: 100%; background: #333333; color: #ffffff; border: none; padding: 20px; border-radius: 14px; font-weight: 500; font-size: 16px; cursor: pointer; -webkit-appearance: none; }
        @media (max-width: 480px) { .content-block { padding: 0 45px; } .title { font-size: 26px; } .description { font-size: 15px; } }
    </style>
</head>
<body>
    <div class="content-block">
        <p class="indicator">Misión 01 / Fase de verdad</p>
        <h1 class="title">La resistencia.</h1>
        <p class="description">Identifica el muro que bloquea tu avance. ¿Cuál es tu mayor resistencia hoy?</p>
        <div class="options-grid">
            <button class="option-btn">Miedo al juicio.</button>
            <button class="option-btn">Comodidad acumulada.</button>
            <button class="option-btn">Falta de claridad.</button>
            <button class="option-btn">Ego / Orgullo.</button>
        </div>
        <button onclick="window.location.href='mision4.html'" class="btn-mando">Sincronizar reporte &#8594;</button>
    </div>
</body>
</html>
