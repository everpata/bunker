<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texto / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS SOBERANOS */
        
        .status-badge-sovereign {
            background-color: #333;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* Ocultar inicialmente para el cerebro de navegación */
        #btn-continuar, #btn-hub { display: none; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        
        <div class="status-badge-sovereign">ESTATUS: SOBERANO</div>
        
        <p class="indicator">Lección 01 / Cúspide</p>
        <div class="progress-container">
            <div class="progress-fill" style="width: 10%;"></div>
        </div>
        
        <h1 class="title">El Rey.</h1>
        <p class="description">Bienvenido a la cúspide. La construcción comienza.</p>
        
        <div class="work-area card">
            <p class="text-base">Aquí no hay teorías, solo ejecución y dominio de tu entorno. El búnker es ahora tu fortaleza y tú eres su única autoridad.</p>
        </div>

        <button id="btn-continuar" class="btn-mando">Continuar →</button>
        
        <button id="btn-hub" class="btn-ghost">← Volver al Hub de la Cúspide</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "01_DQ_texto.html"; 
        const archivoSiguiente = "02_DQ_bitacora.html"; 
        const archivoHub = "09_DQ_hub.html"; 
        const archivoExpulsion = "08_DM_reportefinal.html"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        document.getElementById("btn-continuar").onclick = () => { window.location.href = archivoSiguiente; };
        document.getElementById("btn-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 1. FILTRO SOBERANO
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            const btnNext = document.getElementById("btn-continuar");
                            const btnHub = document.getElementById("btn-hub");

                            // 🧠 CEREBRO DE NAVEGACIÓN DQ
                            if (data.estado === "Finalizado_DQ") {
                                // Modo Repaso Soberano
                                btnNext.style.display = "block";
                                btnHub.style.display = "block";
                            } else {
                                // Modo Construcción (Primera vez)
                                btnNext.style.display = "block";
                                btnHub.style.display = "none";
                            }

                            // GPS DQ
                            if (data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DQ: archivoActual }).catch(err => console.log(err));
                            }

                        } else {
                            // Expulsión a reporte de daños de la DM para que compre la DQ
                            window.location.href = archivoExpulsion; 
                        }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
