<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evidencia / Deepmersion (T02)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        <p class="indicator">Evidencias / DM</p>
        <div class="progress-container"><div class="progress-fill" style="width: 45%;"></div></div>
        
        <h1 class="title">Resultados.</h1>
        <p class="description">La manifestación real de la nueva operativa.</p>
        
        <div class="work-area">
            <img src="yo.jpeg" class="evidence-image">
        </div>
        
        <button class="btn-mando" onclick="window.location.href='05_DM_video.html'">Continuar →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "04_DM_imagen.html";

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELAS TRAMO 02
                        if (data.access_DM !== true) {
                            window.location.href = "21_DF_reporte_final.html"; 
                        } else if (data.fase === "Finalizado_DM") {
                            window.location.href = "21_DM_reporte_final.html"; 
                        } else {
                            // AUTOGUARDADO TRAMO 02
                            userRef.update({ leccion_actual_DM: archivoActual })
                                .catch((err) => console.log("Guardando coordenadas DM...", err));
                        }
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
