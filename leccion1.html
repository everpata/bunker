<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base App</title>

<style>
:root {
  /* 📐 SPACING */
  --space-logo-indicator-desktop: 30px;
  --space-logo-indicator-mobile: 20px;
  --space-indicator-title: 12px;
  --space-title-description: 16px;
  --space-description-content: 32px;
  --space-content-button-desktop: 30px;
  --space-content-button-mobile: 20px;

  /* 🎨 COLORS */
  --color-bg: #ffffff;
  --color-primary: #333333;
  --color-secondary: #878787;
  --color-border: #eaeaea;
  --color-module: #f5f5f7;

  /* 🔤 TYPOGRAPHY */
  --font-title-desktop: 30px;
  --font-title-mobile: 26px;
  --font-body: 16px;
  --font-indicator: 11px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--color-bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

/* 🧱 BLOQUE PRINCIPAL */
.app-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  max-width: 460px;
  padding: 0 40px;

  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* 🖼 LOGO */
.logo {
  margin-left: -10px;
  margin-bottom: var(--space-logo-indicator-desktop);
}

.logo img {
  height: 60px;
}

/* 🔹 INDICADOR */
.indicator {
  font-size: var(--font-indicator);
  font-weight: 600;
  color: var(--color-secondary);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: var(--space-indicator-title);
}

/* 🧠 TÍTULO */
.title {
  font-size: var(--font-title-desktop);
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: var(--space-title-description);
  line-height: 1.1;
}

/* 📄 DESCRIPCIÓN */
.description {
  font-size: var(--font-body);
  color: var(--color-secondary);
  margin-bottom: var(--space-description-content);
}

/* 🧩 ÁREA DE TRABAJO */
.form-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ✏️ INPUTS */
input {
  width: 100%;
  border: none;
  border-bottom: 1px solid var(--color-border);
  padding: 12px 0;
  font-size: var(--font-body);
  color: var(--color-primary);
  background: transparent;
  outline: none;
}

input::placeholder {
  color: var(--color-secondary);
}

/* 🔘 BOTÓN */
.btn {
  width: 100%;
  background: var(--color-primary);
  color: white;
  border: none;
  padding: 18px;
  border-radius: 14px;
  font-size: var(--font-body);
  margin-top: var(--space-content-button-desktop);
  cursor: pointer;
}

/* 📱 MOBILE */
@media (max-width: 480px) {
  .app-container {
    padding: 0 24px;
  }

  .logo {
    margin-bottom: var(--space-logo-indicator-mobile);
  }

  .title {
    font-size: var(--font-title-mobile);
  }

  .btn {
    margin-top: var(--space-content-button-mobile);
  }
}
</style>
</head>

<body>

<div class="app-container">

  <div class="logo">
    <img src="logo.png" alt="logo">
  </div>

  <div class="indicator">Acceso / Registro</div>

  <div class="title">Iniciar expedición.</div>

  <div class="description">
    Crea tus credenciales de acceso para entrar al búnker.
  </div>

  <div class="form-area">
    <input type="text" placeholder="Nombre completo">
    <input type="email" placeholder="Correo electrónico">
    <input type="password" placeholder="Contraseña">
  </div>

  <button class="btn">Crear cuenta →</button>

</div>

</body>
</html>
