<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texto / Deepfall</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator">Lección 01</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 20%;"></div>
        </div>
        
        <h1 class="title">La paradoja.</h1>
        <p class="description">Para ascender, primero debes descender.</p>
        
        <div class="work-area card">
            <p class="text-base">El búnker no es una prisión, es tu <b>laboratorio</b>.</p>
        </div>

        <button class="btn-mando" onclick="window.location.href='02_DF_bitacora.html'">Continuar →</button>
        
        <button id="btn-hub" class="btn-mando" style="display: none; background: transparent; color: #878787; border: 1px solid #eaeaea; margin-top: 15px;" onclick="window.location.href='index.html'">Regresar al Mando</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: COORDENADAS DEL SISTEMA
        // =======================================================
        const archivoActual = "01_DF_texto.html"; // Para el autoguardado (GPS)
        const archivoDeVenta = "index.html";      // Para expulsar intrusos

        // 🔴 ACTUALIZAR: Credenciales de Firebase (Solo si cambias de base de datos)
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Motor de Seguridad y Rastreo
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 1. Autorización concedida: Quitar escudo de carga
                        document.getElementById("loading-screen").style.display = "none";
                        document.getElementById("bunker-content").style.display = "flex";

                        // 2. Revelar botón de escape si es un Veterano repasando
                        if (data.estado === "Finalizado_DF" || data.access_DM === true || data.access_DQ === true) {
                            document.getElementById("btn-hub").style.display = "block";
                        }

                        // 3. Autoguardado (Solo guarda el GPS si es su primera vez pasando por aquí)
                        if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            userRef.update({ leccion_actual_DF: archivoActual }).catch(err => console.log(err));
                        }
                    } else {
                        window.location.href = archivoDeVenta;
                    }
                });
            } else {
                window.location.href = archivoDeVenta;
            }
        });
    </script>
</body>
</html>
