<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora / Deepfall</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator">Reporte</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 80%;"></div>
        </div>
        
        <h1 class="title">Análisis.</h1>
        <p id="log-desc" class="description">Resume tu hallazgo clave.</p>
        
        <div id="log-area" class="work-area card">
            <textarea id="user-reflection" placeholder="Escribe aquí..."></textarea>
        </div>
        
        <button id="btn-next" class="btn-mando">Guardar reporte →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "02_DF_bitacora.html";      // GPS: Archivo actual
        const archivoSiguiente = "03_DF_quiz.html";       // Destino al guardar
        const archivoReporte = "08_DF_reportefinal.html"; // Destino si choca contra el final
        const archivoExpulsion = "index.html";            // Destino si detecta intrusos

        // 🔴 ACTUALIZAR: Credenciales de Firebase (Solo si cambias de base de datos)
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                // 1. RASTREO DE POSICIÓN Y VALIDACIÓN DE ACCESO
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELA: Si terminó la fase gratis y no es VIP, a ventas
                        if (data.estado === "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            window.location.href = archivoReporte;
                        } else {
                            // Autorizado: Retirar escudo de carga
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // AUTOGUARDADO GPS: Solo se activa si es su primera vez pasando por aquí
                            if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                                userRef.update({ leccion_actual_DF: archivoActual }).catch(err => console.log(err));
                            }
                            
                            // RECUPERACIÓN DE MEMORIA (Si el usuario ya había escrito algo y recarga la página)
                            const campoBitacora = "bitacora_" + archivoActual.replace(/\./g, "_");
                            if (data[campoBitacora]) {
                                document.getElementById("user-reflection").value = data[campoBitacora];
                            }
                        }
                    } else {
                        window.location.href = archivoExpulsion;
                    }
                }).catch(() => { window.location.href = archivoExpulsion; });

                // 2. LÓGICA DE GUARDADO DE LA BITÁCORA AL HACER CLIC
                document.getElementById("btn-next").addEventListener("click", () => {
                    const textoUsuario = document.getElementById("user-reflection").value;
                    const btn = document.getElementById("btn-next");
                    
                    // Bloqueo de avance si el campo está vacío
                    if (textoUsuario.trim() === "") {
                        alert("El búnker exige honestidad. No dejes el reporte vacío.");
                        return;
                    }

                    // Feedback visual
                    btn.innerText = "Sincronizando...";
                    btn.disabled = true;

                    // Nombre del campo en Firebase (Generado automáticamente basado en el nombre del archivo)
                    const nombreCampo = "bitacora_" + archivoActual.replace(/\./g, "_");

                    // Inyección de la respuesta en la base de datos y avance
                    userRef.update({
                        [nombreCampo]: textoUsuario
                    }).then(() => {
                        window.location.href = archivoSiguiente;
                    }).catch((error) => {
                        alert("Error al sincronizar: " + error.message);
                        btn.innerText = "Guardar reporte →";
                        btn.disabled = false;
                    });
                });

            } else {
                window.location.href = archivoExpulsion;
            }
        });
    </script>
</body>
</html>
