<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora / Deepmersion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS ESPECÍFICOS */
        
        /* Visibilidad controlada por JS para el repaso */
        #btn-volver-hub { display: none; }

        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DM.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DM.png"></div>
        
        <p class="indicator">Lección 02 / Inmersión</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 33%;"></div>
        </div>
        
        <h1 class="title">Análisis.</h1>
        <p id="log-desc" class="description">Resume tu hallazgo clave en esta fase.</p>
        
        <div id="log-area" class="work-area card">
            <textarea id="user-reflection" placeholder="Escribe aquí tu reporte operativo..."></textarea>
        </div>
        
        <button id="btn-next" class="btn-mando">Guardar reporte →</button>
        
        <button id="btn-volver-hub" class="btn-ghost">← Volver al Hub</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "02_DM_bitacora.html"; 
        const archivoSiguiente = "03_DM_quiz.html"; 
        const archivoHub = "09_DM_hub.html"; 
        const archivoExpulsion = "index.html"; 

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById("btn-volver-hub").onclick = () => { window.location.href = archivoHub; };

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DM === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // Lógica de Repaso / Visibilidad
                            if (data.estado === "Finalizado_DM" || data.access_DQ === true) {
                                document.getElementById("btn-volver-hub").style.display = "block";
                            }

                            // Autoguardado GPS (Solo primera vuelta)
                            if (data.estado !== "Finalizado_DM" && !data.access_DQ) {
                                userRef.update({ leccion_actual_DM: archivoActual }).catch(err => console.log(err));
                            }
                            
                            // Recuperación de memoria
                            const campoBitacora = "bitacora_" + archivoActual.replace(/\./g, "_");
                            if (data[campoBitacora]) {
                                document.getElementById("user-reflection").value = data[campoBitacora];
                            }
                        } else {
                            window.location.href = archivoExpulsion;
                        }
                    } else {
                        window.location.href = archivoExpulsion;
                    }
                }).catch(() => { window.location.href = archivoExpulsion; });

                // Lógica de Guardado
                document.getElementById("btn-next").addEventListener("click", () => {
                    const textoUsuario = document.getElementById("user-reflection").value;
                    const btn = document.getElementById("btn-next");
                    
                    if (textoUsuario.trim() === "") {
                        alert("El búnker exige honestidad. No dejes el reporte vacío.");
                        return;
                    }

                    btn.innerText = "Sincronizando...";
                    btn.disabled = true;

                    const nombreCampo = "bitacora_" + archivoActual.replace(/\./g, "_");

                    userRef.update({
                        [nombreCampo]: textoUsuario
                    }).then(() => {
                        window.location.href = archivoSiguiente;
                    }).catch((error) => {
                        alert("Error al sincronizar: " + error.message);
                        btn.innerText = "Guardar reporte →";
                        btn.disabled = false;
                    });
                });

            } else {
                window.location.href = archivoExpulsion;
            }
        });
    </script>
</body>
</html>
