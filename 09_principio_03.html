<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Principio III / Deepmersion</title><link rel="stylesheet" href="style.css">
    <script>function reveal(){document.body.classList.add('revealed');}</script>
</head>
<body>
    <div class="container">
        <div class="interruption-screen" onclick="reveal()">
            <img src="hacha.png" class="relic-image">
            <p class="indicator">Toca para desenterrar el Principio III</p>
        </div>
        <div class="revelation-screen">
            <div class="logo"><img src="deepmersion.jpeg"></div>
            <p class="indicator">Principio III / 10</p>
            <div class="work-area card">
                <span class="principle-statement">"Afilamos el hacha aunque no vayamos a cortar ningún árbol."</span>
                <p class="text-base">El entrenamiento es el estado natural del hombre profundo.</p>
            </div>
            <button id="btn-next" class="btn-mando" onclick="window.location.href='m_siguiente.html'">Asimilado →</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const btn = document.getElementById('btn-next');

                        // Lógica de cambio de botón si finalizó el programa
                        if (data.fase === "Finalizado" && !data.access_DM) {
                            btn.innerText = "Avanzar al tramo 02 →";
                            btn.onclick = function() { window.location.href = 'hub.html'; };
                        }
                    }
                });
            } else {
                // Centinela: Si no hay usuario loggeado, redirige a inicio
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
