<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: #fff;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando..." style="height: 60px;">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Sincronización / Deepquest</p>
        <div class="progress-container"><div class="progress-fill" style="width: 30%;"></div></div>
        
        <h1 class="title">Evaluación.</h1>
        <p id="quiz-desc" class="description">¿Dónde implementarás tu primer límite?</p>
        
        <div id="quiz-area" class="work-area">
            <button class="option-btn" onclick="this.classList.toggle('selected')">Círculo social.</button>
            <button class="option-btn" onclick="this.classList.toggle('selected')">Negocios.</button>
        </div>
        
        <button id="btn-next" class="btn-mando">Sincronizar →</button>
        <button id="btn-hub" class="btn-mando" style="display: none; background: transparent; color: #878787; border: 1px solid #eaeaea; margin-top: 15px;">Regresar a la Cúspide</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "03_DQ_quiz.html";
        const archivoSiguiente = "04_DQ_imagen.html";
        const archivoHub = "09_DQ_hub.html";
        const archivoExpulsion = "08_DM_reportefinal.html";

        // 🔴 ACTUALIZAR: Credenciales de Firebase
        const firebaseConfig = { apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", authDomain: "deepfall-b3601.firebaseapp.com", projectId: "deepfall-b3601", storageBucket: "deepfall-b3601.firebasestorage.app", messagingSenderId: "207043962011", appId: "1:207043962011:web:681397c7d540b4b3d4523e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        // 1. MOTORES DE NAVEGACIÓN
        document.getElementById("btn-hub").addEventListener("click", () => { window.location.href = archivoHub; });

        // 2. MOTOR DE SEGURIDAD ULTRA-VIP
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.access_DQ === true) {
                            // ES ULTRA-VIP: MOSTRAR
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // GPS Y HABILITACIÓN DE HUB
                            if (data.estado !== "Finalizado_DQ") { 
                                userRef.update({ leccion_actual_DQ: archivoActual }); 
                            }
                            if (data.estado === "Finalizado_DQ") {
                                document.getElementById("btn-hub").style.display = "block";
                            }
                            
                            // LÓGICA DE QUIZ
                            const campoQuiz = "quiz_" + archivoActual.replace(/\./g, "_");
                            const botones = document.querySelectorAll('.option-btn');
                            const btnSiguiente = document.getElementById("btn-next");

                            // Si ya respondió, bloquea edición y habilita paso directo
                            if (data[campoQuiz] && Array.isArray(data[campoQuiz])) {
                                botones.forEach(btn => {
                                    if (data[campoQuiz].includes(btn.innerText.trim())) btn.classList.add('selected');
                                    btn.style.pointerEvents = "none";
                                });
                                btnSiguiente.innerText = "Continuar →";
                                btnSiguiente.addEventListener("click", () => { window.location.href = archivoSiguiente; });
                            } else {
                                // Modo activo: Guardar selección
                                btnSiguiente.addEventListener("click", () => {
                                    const seleccionados = Array.from(document.querySelectorAll('.option-btn.selected')).map(btn => btn.innerText.trim());
                                    if (seleccionados.length === 0) { alert("Toma una decisión operativa para continuar."); return; }
                                    
                                    btnSiguiente.innerText = "Sincronizando..."; 
                                    btnSiguiente.disabled = true;
                                    
                                    userRef.update({ [campoQuiz]: seleccionados }).then(() => { 
                                        window.location.href = archivoSiguiente; 
                                    }).catch(err => { alert("Error: " + err.message); btnSiguiente.disabled = false; });
                                });
                            }
                        } else {
                            window.location.href = archivoExpulsion;
                        }
                    } else { window.location.href = "index.html"; }
                }).catch(() => { window.location.href = "index.html"; });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
