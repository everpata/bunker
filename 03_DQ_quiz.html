<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz / Deepquest (T03)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🚨 COMPONENTES TÁCTICOS DQ */
        
        /* Bloqueo visual del Quiz (Sello de Decisión) */
        .quiz-locked .option-btn {
            pointer-events: none;
            opacity: 0.7;
        }
        .quiz-locked .option-btn.selected {
            opacity: 1;
            border-color: #333333 !important;
            color: #333333 !important;
            font-weight: 700;
        }

        #loading-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; background: #fff;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }

        /* Ocultar botones inicialmente */
        #btn-next, #btn-hub { display: none; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="DQ.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DQ.png"></div>
        <p class="indicator">Evaluación 03 / Cúspide</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 30%;"></div>
        </div>
        
        <h1 class="title">Evaluación.</h1>
        <p id="quiz-desc" class="description">¿Dónde implementarás tu primer límite operativo?</p>
        
        <div id="quiz-area" class="work-area">
            <button class="option-btn" onclick="this.classList.toggle('selected')">Círculo social.</button>
            <button class="option-btn" onclick="this.classList.toggle('selected')">Negocios.</button>
            <button class="option-btn" onclick="this.classList.toggle('selected')">Gestión del tiempo.</button>
        </div>

        <button id="btn-next" class="btn-mando">Sincronizar →</button>
        <button id="btn-hub" class="btn-ghost">← Volver al Hub de la Cúspide</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const archivoActual = "03_DQ_quiz.html";
        const archivoSiguiente = "04_DQ_imagen.html";
        const archivoHub = "09_DQ_hub.html";
        const archivoExpulsion = "08_DM_reportefinal.html";

        const firebaseConfig = { 
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8", 
            authDomain: "deepfall-b3601.firebaseapp.com", 
            projectId: "deepfall-b3601", 
            storageBucket: "deepfall-b3601.firebasestorage.app", 
            messagingSenderId: "207043962011", 
            appId: "1:207043962011:web:681397c7d540b4b3d4523e" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 1. FILTRO SOBERANO
                        if (data.access_DQ === true) {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            const btnNext = document.getElementById("btn-next");
                            const btnHub = document.getElementById("btn-hub");
                            const areaQuiz = document.getElementById("quiz-area");
                            const campoQuiz = "quiz_" + archivoActual.replace(/\./g, "_");

                            // 🏰 EL HUB SIEMPRE VISIBLE PARA EL REY
                            btnHub.style.display = "block";
                            btnHub.onclick = () => { window.location.href = archivoHub; };

                            // 🧠 CEREBRO DE NAVEGACIÓN Y BLOQUEO
                            if (data[campoQuiz] && Array.isArray(data[campoQuiz])) {
                                // MODO REPASO (Ya respondió)
                                areaQuiz.classList.add("quiz-locked");
                                const botones = document.querySelectorAll('.option-btn');
                                botones.forEach(btn => {
                                    if (data[campoQuiz].includes(btn.innerText.trim())) {
                                        btn.classList.add('selected');
                                    }
                                });

                                btnNext.innerText = "Continuar →";
                                btnNext.style.display = "block";
                                btnNext.onclick = () => { window.location.href = archivoSiguiente; };
                            } else {
                                // MODO CONSTRUCCIÓN (Primera vez)
                                btnNext.style.display = "block";
                                btnNext.onclick = () => { ejecutarSincronizacion(userRef, btnNext); };
                            }

                            // GPS DQ (Solo primera vuelta)
                            if (data.estado !== "Finalizado_DQ") {
                                userRef.update({ leccion_actual_DQ: archivoActual });
                            }

                        } else { window.location.href = archivoExpulsion; }
                    } else { window.location.href = "index.html"; }
                });
            } else { window.location.href = "index.html"; }
        });

        function ejecutarSincronizacion(userRef, btn) {
            const seleccionados = Array.from(document.querySelectorAll('.option-btn.selected')).map(btn => btn.innerText.trim());
            if (seleccionados.length === 0) { 
                alert("El Rey debe tomar una decisión operativa."); 
                return; 
            }
            
            btn.innerText = "Sincronizando...";
            btn.disabled = true;
            const campoQuiz = "quiz_" + archivoActual.replace(/\./g, "_");
            
            userRef.update({ [campoQuiz]: seleccionados }).then(() => {
                window.location.href = archivoSiguiente;
            });
        }
    </script>
</body>
</html>
