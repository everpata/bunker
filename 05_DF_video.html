<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video / Deepmersion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator">Módulo 02</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 40%;"></div>
        </div>
        
        <h1 class="title">Análisis Visual.</h1>
        <p class="description">Identifica los patrones de ruido en tu entorno.</p>
        
        <div class="work-area">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>
        
        <button class="btn-mando" onclick="window.location.href='06_DF_texto.html'">He visto el video →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 2. ESCRIBE AQUÍ EL NOMBRE EXACTO DE ESTE ARCHIVO HTML
        // =======================================================
        const archivoActual = "05_DF_video.html";

        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELA: Si ya terminó, lo expulsa al reporte final
                        if (data.fase === "Finalizado") {
                            window.location.href = "21_DF_reporte_final.html"; 
                        } else {
                            // AUTOGUARDADO: Fija sus coordenadas en Firebase
                            userRef.update({ leccion_actual: archivoActual })
                                .catch((err) => console.log("Guardando coordenadas...", err));
                        }
                    }
                });
            } else {
                // CENTINELA BASE: Si no está logueado, lo manda al Login
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
