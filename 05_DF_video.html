<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video / Deepfall</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <img src="DF.png" class="loading-logo" alt="Cargando...">
    </div>

    <div class="container" id="bunker-content" style="display: none;">
        <div class="logo"><img src="DF.png"></div>
        
        <p class="indicator">Módulo 02</p>
        
        <div class="progress-container">
            <div class="progress-fill" style="width: 40%;"></div>
        </div>
        
        <h1 class="title">Análisis Visual.</h1>
        <p class="description">Identifica los patrones de ruido en tu entorno.</p>
        
        <div class="work-area">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>
        
        <button id="btn-continuar" class="btn-mando">He visto el video →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // =======================================================
        // 🔴 ACTUALIZAR: PANEL DE ENRUTAMIENTO (COORDENADAS)
        // =======================================================
        const archivoActual = "05_DF_video.html";         // GPS: Archivo actual
        const archivoSiguiente = "06_DF_principios.html"; // Destino al dar clic en Continuar
        const archivoReporte = "08_DF_reportefinal.html"; // Destino si choca contra el final
        const archivoExpulsion = "index.html";            // Destino si detecta intrusos

        // 🔴 ACTUALIZAR: Credenciales de Firebase (Solo si cambias de base de datos)
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. ASIGNACIÓN DEL BOTÓN CONTINUAR
        document.getElementById("btn-continuar").addEventListener("click", () => {
            window.location.href = archivoSiguiente;
        });

        // 2. MOTOR DE SEGURIDAD Y RASTREO
        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("usuarios").doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // CENTINELA: Si ya terminó el Tramo 01 y no ha pagado, lo expulsa a ventas
                        if (data.estado === "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                            window.location.href = archivoReporte; 
                        } else {
                            // Autorizado: Quitar escudo de carga
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("bunker-content").style.display = "flex";

                            // AUTOGUARDADO GPS: Solo se activa si es su primera vez cursando
                            if (data.estado !== "Finalizado_DF" && !data.access_DM && !data.access_DQ) {
                                userRef.update({ leccion_actual_DF: archivoActual })
                                    .catch((err) => console.log("Error guardando coordenadas...", err));
                            }
                        }
                    } else {
                        window.location.href = archivoExpulsion;
                    }
                }).catch(() => { window.location.href = archivoExpulsion; });
            } else {
                window.location.href = archivoExpulsion;
            }
        });
    </script>
</body>
</html>
