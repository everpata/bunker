<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evidencia / Deepmersion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Únicamente forzamos el centrado vertical de toda la tarjeta */
        html, body { 
            height: 100%; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #ffffff; 
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            justify-content: center; 
            min-height: auto; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="deepmersion.jpeg"></div>
        
        <p class="indicator">Evidencias</p>
        <div class="progress-container"><div class="progress-fill" style="width: 50%;"></div></div>
        <h1 class="title">Resultados.</h1>
        <p class="description">La manifestación real de la teoría operativa.</p>
        <div class="work-area"><img src="yo.jpeg" class="evidence-image"></div>
        
        <button id="main-btn" class="btn-mando" onclick="window.location.href='m_siguiente.html'">Continuar →</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARmU6NUnRajN8dMB6Pi35WbSC2ZKJd-X8",
            authDomain: "deepfall-b3601.firebaseapp.com",
            projectId: "deepfall-b3601",
            storageBucket: "deepfall-b3601.firebasestorage.app",
            messagingSenderId: "207043962011",
            appId: "1:207043962011:web:681397c7d540b4b3d4523e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // CENTINELA
        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("usuarios").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const btn = document.getElementById('main-btn');

                        // Si terminó el programa, cambia el botón
                        if (data.fase === "Finalizado" && !data.access_DM) {
                            btn.innerText = "Avanzar al tramo 02 →";
                            btn.onclick = function() { window.location.href = 'hub.html'; };
                        }
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
